<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚂 Train Tracks</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sidebar-w: 90px;
  --cell-size: 60px;
  --grass: #7CB342;
  --grass-dark: #689F38;
  --grass-hover: #85BB4A;
  --wood: #8D6E63;
  --wood-light: #BCAAA4;
  --track: #5D4037;
  --track-light: #A1887F;
  --sky: #E8F5E9;
  --sky-gradient-start: #E8F5E9;
  --sky-gradient-end: #C8E6C9;
  --sidebar-top: #6D4C41;
  --sidebar-bottom: #5D4037;
  --header-color: #3E2723;
  --accent: #FF6B6B;
  --play-green: #4CAF50;
  --stop-red: #F44336;
  --house-glow: none;
  --star-bg: none;
}

body.night-mode {
  --grass: #2E4A3A;
  --grass-dark: #1E3A2A;
  --grass-hover: #3A5A4A;
  --sky: #0D1B2A;
  --sky-gradient-start: #0D1B2A;
  --sky-gradient-end: #1B2838;
  --sidebar-top: #1A2332;
  --sidebar-bottom: #0F1923;
  --header-color: #B0BEC5;
  --house-glow: 0 0 12px 4px rgba(255, 200, 50, 0.6);
  --star-bg:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 25% 42%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1.5px 1.5px at 45% 8%, rgba(255,255,255,0.9), transparent),
    radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 75% 18%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 88% 48%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 35% 78%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 55% 58%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 70% 72%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 92% 82%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 40% 92%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 82% 5%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 50% 25%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 20% 50%, rgba(255,255,255,0.5), transparent);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: var(--sky);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  transition: background 0.5s ease;
}

#app {
  display: flex;
  width: 100%; height: 100%;
}

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w);
  background: linear-gradient(180deg, var(--sidebar-top), var(--sidebar-bottom));
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  gap: 6px;
  box-shadow: 2px 0 8px rgba(0,0,0,0.2);
  z-index: 10;
  overflow-y: auto;
  transition: width 0.25s ease, padding 0.25s ease, opacity 0.2s ease, background 0.5s ease;
}

#app.sidebar-hidden #sidebar {
  width: 0;
  padding: 0;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
}

#sidebar-toggle {
  position: fixed;
  left: var(--sidebar-w);
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 48px;
  background: var(--sidebar-bottom);
  border: none;
  border-radius: 0 8px 8px 0;
  color: white;
  font-size: 14px;
  cursor: pointer;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 2px 0 6px rgba(0,0,0,0.2);
  transition: left 0.25s ease, background 0.5s ease;
  padding: 0;
}

#sidebar-toggle:hover {
  background: var(--sidebar-top);
}

#app.sidebar-hidden #sidebar-toggle {
  left: 0;
}

#sidebar h2 {
  color: #FFCC80;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 4px 0 2px;
}

.palette-piece {
  width: 64px; height: 64px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  transition: transform 0.15s, background 0.15s;
  position: relative;
}

.palette-piece:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.08);
}

.palette-piece:active { cursor: grabbing; }

.palette-piece .label {
  position: absolute;
  bottom: 2px;
  font-size: 8px;
  color: rgba(255,255,255,0.7);
  text-align: center;
  width: 100%;
}

.palette-train {
  border: 2px dashed rgba(255,200,0,0.5);
}

.palette-train-red { background: rgba(229,57,53,0.2) !important; border-color: rgba(229,57,53,0.5); }
.palette-train-blue { background: rgba(30,136,229,0.2) !important; border-color: rgba(30,136,229,0.5); }
.palette-train-green { background: rgba(67,160,71,0.2) !important; border-color: rgba(67,160,71,0.5); }

.palette-car {
  background: rgba(139,195,74,0.2) !important;
  border: 2px dashed rgba(139,195,74,0.5);
}

.palette-divider {
  width: 50px;
  height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 2px 0;
}

/* MAIN AREA */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  gap: 10px;
  overflow: hidden;
  background-image: var(--star-bg);
  background-size: 100% 100%;
  transition: background-color 0.5s ease;
}

#header {
  display: flex;
  align-items: center;
  gap: 10px;
}

#header h1 {
  font-size: 22px;
  font-weight: 800;
  color: var(--header-color);
  transition: color 0.5s ease;
}

/* GRID */
#grid-container {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15), inset 0 0 0 3px rgba(0,0,0,0.1);
  transition: box-shadow 0.5s ease;
}

body.night-mode #grid-container {
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 0 0 3px rgba(0,0,0,0.3);
}

#grid {
  display: grid;
  background: var(--grass-dark);
  gap: 1px;
  transition: background 0.5s ease;
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  background: var(--grass);
  position: relative;
  transition: background 0.15s;
}

.cell:hover { background: var(--grass-hover); }
.cell.highlight { background: #A5D64E; box-shadow: inset 0 0 0 2px #FFF; }
.cell .ghost-preview {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.5;
  pointer-events: none;
  z-index: 3;
}
.cell .ghost-preview-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.5;
  pointer-events: none;
  z-index: 3;
}
.cell.highlight.ghost-match {
  background: #A5D64E;
  box-shadow: inset 0 0 0 3px rgba(76, 175, 80, 0.9), inset 0 0 12px rgba(76, 175, 80, 0.3);
}
.cell.highlight.ghost-mismatch {
  background: #E8A5A5;
  box-shadow: inset 0 0 0 3px rgba(244, 67, 54, 0.9), inset 0 0 12px rgba(244, 67, 54, 0.3);
}
.cell.occupied { cursor: pointer; }
.cell.has-train { z-index: 5; }

.cell svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.cell .train-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: calc(var(--cell-size) * 0.6);
  z-index: 6;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  transition: transform 0.1s;
}

.cell .train-svg {
  position: absolute;
  top: 5%; left: 5%;
  width: 90%; height: 90%;
  z-index: 6;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  pointer-events: auto;
  cursor: grab;
  transition: transform 0.2s ease-out;
}

.cell .train-svg:active {
  cursor: grabbing;
}

.cell .train-svg.snapping-back {
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.cell .scenery-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: calc(var(--cell-size) * 0.55);
  pointer-events: none;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
}

/* Connection glow */
.cell .connection-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #76FF03;
  box-shadow: 0 0 6px #76FF03;
  z-index: 4;
  opacity: 0;
  transition: opacity 0.3s;
}
.cell .connection-dot.connected { opacity: 1; }
.cell .connection-dot.disconnected { background: #FF5252; box-shadow: 0 0 6px #FF5252; opacity: 0.7; }

/* Auto-connect pulse animation */
@keyframes connect-pulse {
  0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
  40% { transform: translateX(-50%) scale(2.2); box-shadow: 0 0 14px #76FF03, 0 0 24px rgba(118,255,3,0.4); }
  100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
}
@keyframes connect-pulse-y {
  0% { transform: translateY(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
  40% { transform: translateY(-50%) scale(2.2); box-shadow: 0 0 14px #76FF03, 0 0 24px rgba(118,255,3,0.4); }
  100% { transform: translateY(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
}
.cell .connection-dot.pulsing.n,
.cell .connection-dot.pulsing.s { animation: connect-pulse 0.6s ease-out; }
.cell .connection-dot.pulsing.e,
.cell .connection-dot.pulsing.w { animation: connect-pulse-y 0.6s ease-out; }
.cell .connection-dot.n { top: -3px; left: 50%; transform: translateX(-50%); }
.cell .connection-dot.s { bottom: -3px; left: 50%; transform: translateX(-50%); }
.cell .connection-dot.e { right: -3px; top: 50%; transform: translateY(-50%); }
.cell .connection-dot.w { left: -3px; top: 50%; transform: translateY(-50%); }

/* Switch lever for T-junctions */
.switch-lever {
  position: absolute;
  width: 18px;
  height: 18px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: #FFAB40;
  border: 2px solid #FF8F00;
  cursor: pointer;
  z-index: 7;
  pointer-events: auto;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  transition: background 0.2s, border-color 0.2s;
}

.switch-lever:hover {
  background: #FFD54F;
  transform: translate(-50%, -50%) scale(1.15);
}

.switch-lever.branch {
  background: #66BB6A;
  border-color: #43A047;
}

.switch-lever.branch:hover {
  background: #81C784;
  transform: translate(-50%, -50%) scale(1.15);
}

.lever-arm {
  position: absolute;
  width: 4px;
  height: 14px;
  bottom: 50%;
  left: 50%;
  transform: translateX(-50%) rotate(var(--lever-angle, 0deg));
  transform-origin: center bottom;
  background: #E65100;
  border-radius: 2px;
  pointer-events: none;
  transition: transform 0.3s ease, background 0.2s;
}

.switch-lever.branch .lever-arm {
  background: #2E7D32;
}

/* CONTROLS */
#controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-play { background: var(--play-green); color: white; box-shadow: 0 3px 10px rgba(76,175,80,0.4); }
.btn-stop { background: var(--stop-red); color: white; box-shadow: 0 3px 10px rgba(244,67,54,0.4); }
.btn-clear { background: #FF9800; color: white; box-shadow: 0 3px 10px rgba(255,152,0,0.3); }
.btn-undo { background: #9E9E9E; color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }

.speed-control {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--header-color);
  font-weight: 700;
  font-size: 13px;
  transition: color 0.5s ease;
}

.speed-control input[type=range] {
  width: 80px;
  accent-color: var(--play-green);
}

/* GHOST (dragged piece) */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  opacity: 0.85;
  transform: translate(-50%, -50%) scale(1.1);
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  transition: opacity 0.1s;
}

/* TRASH ZONE */
#trash-zone {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(244,67,54,0.15);
  border: 2px dashed rgba(244,67,54,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 50;
  pointer-events: none;
}

#trash-zone.visible { opacity: 1; pointer-events: auto; }
#trash-zone.hover { background: rgba(244,67,54,0.3); transform: scale(1.15); }

/* TOAST */
#toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
  z-index: 200;
  transition: transform 0.3s ease;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* TRAIN REPLACEMENT FLASH */
@keyframes train-replace-flash {
  0% { background: rgba(255, 200, 0, 0.8); transform: scale(1.2); }
  50% { background: rgba(255, 200, 0, 0.4); transform: scale(1.1); }
  100% { background: var(--grass); transform: scale(1); }
}
.cell.replacing-train {
  animation: train-replace-flash 0.5s ease-out;
}

/* POOF ANIMATION (right-click removal) */
@keyframes poof {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  50% {
    opacity: 0.8;
    transform: translate(-50%, -50%) scale(1.3);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.6);
  }
}
.poof-effect {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: calc(var(--cell-size) * 0.8);
  pointer-events: none;
  z-index: 10;
  animation: poof 0.5s ease-out forwards;
}

/* SAVE MODAL */
#save-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
#save-overlay.open { display: flex; }

#save-modal {
  background: #FFF;
  border-radius: 16px;
  padding: 24px;
  width: 380px;
  max-width: 90vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  position: relative;
}

#save-modal h2 {
  font-size: 20px;
  color: #3E2723;
  margin-bottom: 16px;
  text-align: center;
}

#save-modal .close-btn {
  position: absolute;
  top: 12px; right: 14px;
  background: none; border: none;
  font-size: 22px; cursor: pointer;
  color: #999;
  line-height: 1;
}
#save-modal .close-btn:hover { color: #333; }

.save-slot {
  border: 2px solid #E0E0E0;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  align-items: center;
  transition: border-color 0.2s;
}
.save-slot:hover { border-color: #BDBDBD; }

.save-slot canvas {
  width: 100px;
  height: 67px;
  border-radius: 6px;
  background: #E8F5E9;
  flex-shrink: 0;
}

.save-slot .slot-info {
  flex: 1;
  min-width: 0;
}

.save-slot .slot-name {
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  border: 1px solid #E0E0E0;
  border-radius: 6px;
  padding: 4px 8px;
  width: 100%;
  outline: none;
  color: #3E2723;
}
.save-slot .slot-name:focus { border-color: #4CAF50; }

.save-slot .slot-time {
  font-size: 11px;
  color: #999;
  margin-top: 4px;
}

.save-slot .slot-empty {
  font-size: 12px;
  color: #BDBDBD;
  font-style: italic;
}

.save-slot .slot-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}

.save-slot .slot-actions button {
  padding: 4px 10px;
  border: none;
  border-radius: 6px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  transition: transform 0.1s;
}
.save-slot .slot-actions button:hover { transform: scale(1.05); }
.save-slot .slot-actions .btn-save-slot { background: #4CAF50; color: white; }
.save-slot .slot-actions .btn-load-slot { background: #2196F3; color: white; }
.save-slot .slot-actions .btn-delete-slot { background: #F44336; color: white; }

/* SMOKE PARTICLES */
@keyframes smoke-rise {
  0% { opacity: 0.6; transform: translate(var(--smoke-dx, 0px), 0px) scale(1); }
  100% { opacity: 0; transform: translate(var(--smoke-dx, 0px), -40px) scale(1.8); }
}
.smoke-particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(200, 200, 200, 0.7);
  pointer-events: none;
  z-index: 55;
  animation: smoke-rise var(--smoke-duration, 0.8s) ease-out forwards;
}

/* CONFETTI PARTICLES */
@keyframes confetti-burst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  60% { opacity: 0.8; }
  100% { opacity: 0; transform: translate(var(--confetti-dx, 50px), var(--confetti-dy, -50px)) scale(0.4); }
}
.confetti-particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 60;
  animation: confetti-burst 1.2s ease-out forwards;
}

/* CRASH ANIMATIONS */
@keyframes crash-star-burst {
  0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
  50% { opacity: 0.9; }
  100% { opacity: 0; transform: translate(var(--star-dx, 40px), var(--star-dy, -40px)) scale(0.3) rotate(180deg); }
}
.crash-star {
  position: absolute;
  pointer-events: none;
  z-index: 65;
  font-size: 14px;
  animation: crash-star-burst 1s ease-out forwards;
}

@keyframes crash-dust-puff {
  0% { opacity: 0.7; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dust-dx, 10px), var(--dust-dy, 10px)) scale(2.5); }
}
.crash-dust {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 62;
  animation: crash-dust-puff 0.8s ease-out forwards;
}

@keyframes crash-wobble {
  0% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateX(0); }
  15% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateX(-6px); }
  30% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateX(5px); }
  45% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateX(-4px); }
  60% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateX(3px); }
  75% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateX(-2px); }
  100% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateX(0); }
}

@keyframes crash-bounce-back {
  0% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateY(0); }
  40% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateY(12px); }
  70% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateY(-4px); }
  100% { transform: translate(-50%, -50%) rotate(var(--train-angle)) translateY(0); }
}

/* CAR RENDERING */
.cell .car-svg {
  position: absolute;
  top: 5%; left: 5%;
  width: 90%; height: 90%;
  z-index: 6;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  pointer-events: auto;
  cursor: pointer;
}

.car-count-badge {
  position: absolute;
  bottom: 2px;
  right: 2px;
  font-size: 9px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 1px 4px;
  border-radius: 6px;
  z-index: 8;
  pointer-events: none;
  white-space: nowrap;
}

/* HOUSE GLOW (Night Mode) */
body.night-mode .cell .scenery-emoji {
  transition: text-shadow 0.5s ease;
}

/* HEADLIGHT GLOW (Night Mode) */
#train-headlight {
  position: absolute;
  width: 0; height: 0;
  pointer-events: none;
  z-index: 45;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s ease;
}

body.night-mode #train-headlight.active {
  opacity: 1;
}

/* Night mode toggle button */
.btn-night {
  background: #607D8B;
  color: white;
  box-shadow: 0 3px 10px rgba(96,125,139,0.3);
}

body.night-mode .btn-night {
  background: #263238;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
}

/* WATER TILES */
.cell.water-cell {
  background: linear-gradient(135deg, #29B6F6, #0288D1, #0277BD);
  overflow: hidden;
  position: relative;
}

.cell.water-cell::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse 18px 6px at 30% 40%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(ellipse 14px 5px at 65% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(ellipse 16px 5px at 50% 75%, rgba(255,255,255,0.18) 0%, transparent 100%);
  animation: water-wave 3s ease-in-out infinite;
  pointer-events: none;
  z-index: 1;
}

@keyframes water-wave {
  0% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(3px, 2px) rotate(0.5deg); }
  50% { transform: translate(-2px, 4px) rotate(-0.3deg); }
  75% { transform: translate(1px, -1px) rotate(0.2deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

.cell.water-cell:hover {
  background: linear-gradient(135deg, #4FC3F7, #039BE5, #0288D1);
}

/* Night mode water */
body.night-mode .cell.water-cell {
  background: linear-gradient(135deg, #0D47A1, #1A237E, #0D47A1);
}

body.night-mode .cell.water-cell::before {
  background:
    radial-gradient(ellipse 18px 6px at 30% 40%, rgba(200,220,255,0.15) 0%, transparent 100%),
    radial-gradient(ellipse 14px 5px at 65% 55%, rgba(200,220,255,0.1) 0%, transparent 100%),
    radial-gradient(ellipse 20px 7px at 45% 65%, rgba(180,200,240,0.08) 0%, transparent 100%);
}

body.night-mode .cell.water-cell::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse 60% 30% at 55% 35%, rgba(255,255,220,0.08) 0%, transparent 100%);
  pointer-events: none;
  z-index: 2;
  animation: moonlight-shimmer 4s ease-in-out infinite;
}

@keyframes moonlight-shimmer {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

body.night-mode .cell.water-cell:hover {
  background: linear-gradient(135deg, #1565C0, #283593, #1565C0);
}

/* Duck on water */
.water-duck {
  position: absolute;
  font-size: calc(var(--cell-size) * 0.32);
  z-index: 3;
  pointer-events: none;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  animation: duck-drift var(--duck-duration, 4s) ease-in-out infinite;
  animation-delay: var(--duck-delay, 0s);
}

@keyframes duck-drift {
  0% { transform: translate(0, 0) rotate(0deg); }
  20% { transform: translate(5px, -3px) rotate(5deg); }
  50% { transform: translate(-3px, 2px) rotate(-3deg); }
  80% { transform: translate(4px, -1px) rotate(4deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

/* Bridge over water enhancement */
.cell.bridge-over-water svg {
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
}

.cell.bridge-over-water::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, rgba(41,182,246,0.3), rgba(2,136,209,0.2));
  pointer-events: none;
  z-index: 0;
  border-radius: 0;
}

body.night-mode .cell.bridge-over-water::after {
  background: linear-gradient(135deg, rgba(13,71,161,0.4), rgba(26,35,126,0.3));
}

/* TREE SWAY ANIMATION */
@keyframes tree-sway {
  0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
  25% { transform: translate(-50%, -50%) rotate(3deg); }
  75% { transform: translate(-50%, -50%) rotate(-3deg); }
}

.scenery-tree {
  animation: tree-sway var(--tree-sway-duration, 3.5s) ease-in-out infinite;
  animation-delay: var(--tree-sway-delay, 0s);
}

/* Flipped cow */
.scenery-cow-flipped {
  transform: translate(-50%, -50%) scaleX(-1) !important;
}

/* CHIMNEY SMOKE */
@keyframes chimney-smoke-rise {
  0% { opacity: 0.4; transform: translate(var(--chimney-dx, 0px), 0px) scale(0.6); }
  100% { opacity: 0; transform: translate(var(--chimney-dx, 0px), -25px) scale(1.4); }
}
.chimney-smoke {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 4;
  animation: chimney-smoke-rise var(--chimney-duration, 2s) ease-out forwards;
}

/* Pause animations when tab hidden */
.animations-paused .scenery-tree {
  animation-play-state: paused !important;
}
.animations-paused .water-duck {
  animation-play-state: paused !important;
}
.animations-paused .cell.water-cell::before {
  animation-play-state: paused !important;
}

/* TUNNEL NIGHT GLOW */
body.night-mode .cell.has-tunnel svg {
  filter: drop-shadow(0 0 6px rgba(255, 200, 80, 0.3));
}

/* PLAYING STATE */
#app.playing .cell { cursor: default; }
#app.playing .cell:hover { background: var(--grass); }
#app.playing .cell.has-switch { cursor: pointer; }
#app.playing .cell.has-switch:hover { background: var(--grass-hover); }
#app.playing #sidebar { opacity: 0.5; pointer-events: none; }

/* RESPONSIVE */
@media (max-width: 768px) {
  :root { --sidebar-w: 70px; }
  .palette-piece { width: 54px; height: 54px; }
  #header h1 { font-size: 18px; }
  .btn { padding: 6px 14px; font-size: 12px; }
  #sidebar-toggle { width: 28px; height: 56px; font-size: 16px; }
}

/* PALETTE SELECTED */
.palette-piece.palette-selected {
  background: rgba(255,200,0,0.35) !important;
  box-shadow: inset 0 0 0 2px rgba(255,200,0,0.8), 0 0 10px rgba(255,200,0,0.3);
  transform: scale(1.05);
}

/* KEYBOARD SHORTCUTS OVERLAY */
#shortcuts-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
#shortcuts-overlay.open { display: flex; }

#shortcuts-modal {
  background: #FFF;
  border-radius: 16px;
  padding: 24px;
  width: 380px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  position: relative;
}

body.night-mode #shortcuts-modal {
  background: #263238;
  color: #ECEFF1;
}

#shortcuts-modal h2 {
  font-size: 20px;
  color: #3E2723;
  margin-bottom: 16px;
  text-align: center;
}

body.night-mode #shortcuts-modal h2 {
  color: #ECEFF1;
}

#shortcuts-modal .close-btn {
  position: absolute;
  top: 12px; right: 14px;
  background: none; border: none;
  font-size: 22px; cursor: pointer;
  color: #999;
  line-height: 1;
}
#shortcuts-modal .close-btn:hover { color: #333; }

.shortcut-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

body.night-mode .shortcut-row {
  border-bottom-color: rgba(255,255,255,0.08);
}

.shortcut-row:last-child { border-bottom: none; }

.shortcut-key {
  display: inline-block;
  background: #ECEFF1;
  color: #37474F;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: monospace;
  font-size: 13px;
  font-weight: 700;
  border: 1px solid #CFD8DC;
  min-width: 28px;
  text-align: center;
}

body.night-mode .shortcut-key {
  background: #37474F;
  color: #ECEFF1;
  border-color: #455A64;
}

.shortcut-desc {
  font-size: 13px;
  color: #546E7A;
}

body.night-mode .shortcut-desc {
  color: #B0BEC5;
}

.shortcut-section {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #9E9E9E;
  margin: 12px 0 6px;
}
.shortcut-section:first-child { margin-top: 0; }

</head>
<body>
<div id="app">
  <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle palette">◀</button>
  <div id="sidebar">
    <h2>Tracks</h2>
    <div class="palette-piece" data-type="straight"><div class="label">Straight</div></div>
    <div class="palette-piece" data-type="curve"><div class="label">Curve</div></div>
    <div class="palette-piece" data-type="tjunction"><div class="label">T-Split</div></div>
    <div class="palette-piece" data-type="crossover"><div class="label">Cross</div></div>
    <div class="palette-piece" data-type="bridge"><div class="label">Bridge</div></div>
    <div class="palette-piece" data-type="tunnel"><div class="label">Tunnel</div></div>
    <div class="palette-piece" data-type="station"><div class="label">Station</div></div>
    <div class="palette-divider"></div>
    <h2>Trains</h2>
    <div class="palette-piece palette-train palette-train-red" data-type="train-red"><div class="label">Red</div></div>
    <div class="palette-piece palette-train palette-train-blue" data-type="train-blue"><div class="label">Blue</div></div>
    <div class="palette-piece palette-train palette-train-green" data-type="train-green"><div class="label">Green</div></div>
    <div class="palette-divider"></div>
    <h2>Cars</h2>
    <div class="palette-piece palette-car" data-type="freight"><div class="label">Freight</div></div>
    <div class="palette-piece palette-car" data-type="passenger"><div class="label">Passenger</div></div>
    <div class="palette-piece palette-car" data-type="caboose"><div class="label">Caboose</div></div>
    <div class="palette-divider"></div>
    <h2>Scenery</h2>
    <div class="palette-piece" data-type="tree"><div class="label">Tree</div></div>
    <div class="palette-piece" data-type="house"><div class="label">House</div></div>
    <div class="palette-piece" data-type="cow"><div class="label">Cow</div></div>
    <div class="palette-piece" data-type="water"><div class="label">Water</div></div>
  </div>
  <div id="main">
    <div id="header">
      <h1>🚂 Train Tracks</h1>
    </div>
    <div id="grid-container">
      <div id="grid"></div>
      <div id="train-headlight"></div>
    </div>
    <div id="controls">
      <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶️ Play</button>
      <button class="btn" onclick="generateRandomTrack()" style="background:#9C27B0;color:white;box-shadow:0 3px 10px rgba(156,39,176,0.3);">🎲 Random</button>
      <button class="btn btn-clear" onclick="clearAll()">🗑️ Clear</button>
      <button class="btn btn-undo" id="btn-undo" onclick="undo()">↩️ Undo</button>
      <button class="btn btn-undo" id="btn-redo" onclick="redo()" disabled>↪️ Redo</button>
      <div class="speed-control">
        🐢 <input type="range" id="speed-slider" min="0.3" max="4" step="0.1" value="1.2"> 🐇
      </div>
      <button class="btn" id="btn-mute" onclick="toggleMute()" style="background:#78909C;color:white;padding:8px 12px;">🔊</button>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8" oninput="onVolumeChange(event)" style="width:50px;accent-color:#78909C;" title="Volume">
      <button class="btn btn-night" id="btn-night" onclick="toggleNightMode()" style="padding:8px 12px;">☀️</button>
      <button class="btn" onclick="openSaveModal()" style="background:#607D8B;color:white;box-shadow:0 3px 10px rgba(96,125,139,0.3);">💾 Save</button>
      <button class="btn" onclick="openShortcutsModal()" style="background:#546E7A;color:white;padding:8px 12px;" title="Keyboard shortcuts">⌨️</button>
    </div>
  </div>
</div>

<!-- Save/Load Modal -->
<div id="save-overlay" onclick="closeSaveModalOutside(event)">
  <div id="save-modal">
    <button class="close-btn" onclick="closeSaveModal()">✕</button>
    <h2>💾 Save & Load</h2>
    <div id="save-slots"></div>
  </div>
</div>

<!-- Keyboard Shortcuts Modal -->
<div id="shortcuts-overlay" onclick="closeShortcutsModalOutside(event)">
  <div id="shortcuts-modal">
    <button class="close-btn" onclick="closeShortcutsModal()">✕</button>
    <h2>⌨️ Keyboard Shortcuts</h2>
    <div class="shortcut-section">Playback</div>
    <div class="shortcut-row"><span class="shortcut-desc">Play / Stop</span><span class="shortcut-key">Space</span></div>
    <div class="shortcut-section">Building</div>
    <div class="shortcut-row"><span class="shortcut-desc">Straight track</span><span class="shortcut-key">1</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Curve track</span><span class="shortcut-key">2</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">T-Split</span><span class="shortcut-key">3</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Crossover</span><span class="shortcut-key">4</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Bridge</span><span class="shortcut-key">5</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Tunnel</span><span class="shortcut-key">6</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Station</span><span class="shortcut-key">7</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Remove hovered piece</span><span class="shortcut-key">Del</span></div>
    <div class="shortcut-section">Actions</div>
    <div class="shortcut-row"><span class="shortcut-desc">Random track</span><span class="shortcut-key">R</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Undo</span><span class="shortcut-key">Z</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Redo</span><span class="shortcut-key">⇧Z</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Clear board</span><span class="shortcut-key">C</span></div>
    <div class="shortcut-section">Display</div>
    <div class="shortcut-row"><span class="shortcut-desc">Night mode</span><span class="shortcut-key">N</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Toggle sidebar</span><span class="shortcut-key">Tab</span></div>
    <div class="shortcut-section">Other</div>
    <div class="shortcut-row"><span class="shortcut-desc">Show shortcuts</span><span class="shortcut-key">?</span></div>
    <div class="shortcut-row"><span class="shortcut-desc">Close modal / Deselect</span><span class="shortcut-key">Esc</span></div>
  </div>
</div>
