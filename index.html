    // Clean up after animation
    setTimeout(() => { if (particle.parentNode) particle.remove(); }, 1300);
  }
}

// ============================================================
// CAR ANIMATION HELPERS
// ============================================================
function findHistoryEntry(history, targetDist) {
  if (history.length === 0) return null;
  let lo = 0, hi = history.length - 1;
  if (targetDist <= history[lo].dist) return history[lo];
  if (targetDist >= history[hi].dist) return history[hi];
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (history[mid].dist <= targetDist) lo = mid;
    else hi = mid;
  }
  const loE = history[lo], hiE = history[hi];
  const range = hiE.dist - loE.dist;
  if (range < 0.01) return loE;
  const t = (targetDist - loE.dist) / range;
  return {
    x: loE.x + (hiE.x - loE.x) * t,
    y: loE.y + (hiE.y - loE.y) * t,
    angle: lerpAngle(loE.angle, hiE.angle, t),
    dist: targetDist,
  };
}

function lerpAngle(a, b, t) {
  let diff = b - a;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return a + diff * t;
}

function togglePlay() {
  if (state.playing) {
    stopPlay();
  } else {
    startPlay();
  }
}

function startPlay() {
  if (!state.train) {
    showToast('Place a train first! 🚂');
    return;
  }

  const piece = state.grid[state.train.row][state.train.col];
  if (!piece) {
    showToast('Train must be on a track!');
    return;
  }

  const conns = getConnections(piece.type, piece.rotation);
  if (conns.length === 0) return;

  // Determine initial direction: find first connected neighbor
  let startExit = null;
  for (const dir of conns) {
    if (neighborConnected(state.train.row, state.train.col, dir)) {
      startExit = dir;
      break;
    }
  }

  if (!startExit) {
    // No connected neighbors — try to just animate within the cell
    startExit = conns[0];
  }

  // Entry is opposite of first exit (train "enters" from the other side)
  const entryEdge = OPPOSITE[startExit] || conns.find(d => d !== startExit) || conns[0];

  state.playing = true;
  document.getElementById('app').classList.add('playing');
  document.getElementById('btn-play').innerHTML = '⏹️ Stop';
  document.getElementById('btn-play').className = 'btn btn-stop';

  // Remove static train SVG and car displays
  if (state.train) {
    const cell = getCellEl(state.train.row, state.train.col);
    if (cell) cell.querySelectorAll('.train-svg, .train-emoji').forEach(el => el.remove());
  }
  document.querySelectorAll('.car-svg, .car-count-badge').forEach(el => el.remove());

  // Create animated train element (top-down SVG)
  const trainEl = document.createElement('div');
  trainEl.id = 'animated-train';
  const trainSvg = createTrainSVG();
  const trainSize = cellSize * 0.75;
  trainSvg.style.width = trainSize + 'px';
  trainSvg.style.height = trainSize + 'px';
  trainSvg.style.display = 'block';
  trainEl.appendChild(trainSvg);
  trainEl.style.cssText = `
    position: absolute;
    z-index: 50;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    transition: none;
    line-height: 0;
  `;
  document.getElementById('grid-container').appendChild(trainEl);

  const exitDir = getExitDir(piece.type, piece.rotation, entryEdge);

  animState = {
    row: state.train.row,
    col: state.train.col,
    entryEdge: entryEdge,
    exitEdge: exitDir || startExit,
    path: null,
    progress: 0,
    trainEl: trainEl,
    lastTime: performance.now(),
    startRow: state.train.row,
    startCol: state.train.col,
    cellsVisited: 0,
    loopCompleted: false,
    positionHistory: [],
    cumulativeDistance: 0,
    lastRenderPos: null,
    carEls: [],
  };

  // Compute path
  animState.path = getPathPoints(piece.type, piece.rotation, animState.entryEdge, animState.exitEdge);

  // Create animated car elements with pre-seeded position history
  if (state.cars.length > 0) {
    const carSpacing = cellSize * 0.85;
    const gridEl = document.getElementById('grid');
    const gRect = gridEl.getBoundingClientRect();
    const cRect = document.getElementById('grid-container').getBoundingClientRect();
    const offX = gRect.left - cRect.left;
    const offY = gRect.top - cRect.top;
    const dirAngles = { N: 0, E: 90, S: 180, W: 270 };

    // Pre-seed position history with static car positions (farthest first)
    const staticCarPos = getCarCellPositions();
    for (let i = Math.min(staticCarPos.length, state.cars.length) - 1; i >= 0; i--) {
      const cp = staticCarPos[i];
      animState.positionHistory.push({
        x: cp.col * (cellSize + 1) + cellSize / 2 + offX,
        y: cp.row * (cellSize + 1) + cellSize / 2 + offY,
        angle: dirAngles[cp.facingDir] || 0,
        dist: -(i + 1) * carSpacing,
      });
    }

    for (let i = 0; i < state.cars.length; i++) {
      const carEl = document.createElement('div');
      carEl.className = 'animated-car';
      const carSvg = createCarSVG(state.cars[i].type);
      const carSize = cellSize * 0.7;
      carSvg.style.width = carSize + 'px';
      carSvg.style.height = carSize + 'px';
      carSvg.style.display = 'block';
      carEl.appendChild(carSvg);
      carEl.style.cssText = 'position:absolute;z-index:' + (49 - i) + ';pointer-events:none;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.25));line-height:0;';

      // Position at static position initially
      if (i < staticCarPos.length) {
        const cp = staticCarPos[i];
        const cx = cp.col * (cellSize + 1) + cellSize / 2 + offX;
        const cy = cp.row * (cellSize + 1) + cellSize / 2 + offY;
        carEl.style.left = cx + 'px';
        carEl.style.top = cy + 'px';
        carEl.style.transform = 'translate(-50%, -50%) rotate(' + (dirAngles[cp.facingDir] || 0) + 'deg)';
      } else {
        carEl.style.opacity = '0';
      }

      document.getElementById('grid-container').appendChild(carEl);
      animState.carEls.push(carEl);
    }
  }

  SFX.whistle();
  setTimeout(startChugLoop, 500);
  setTimeout(startSmokeLoop, 300);
  updateHeadlightVisibility();
  requestAnimationFrame(animateFrame);
}

function animateFrame(timestamp) {
  if (!state.playing || !animState) return;

  const dt = (timestamp - animState.lastTime) / 1000;
  animState.lastTime = timestamp;

  const speed = parseFloat(document.getElementById('speed-slider').value) || 1;

  // Progress: 1.0 = one full cell traversal
  // A curve path is longer (~π/4 * cellSize) vs straight (cellSize), normalize
  const pLen = pathLength(animState.path);
  const normalizedSpeed = speed / Math.max(pLen, 0.5); // adjust for path length
  animState.progress += normalizedSpeed * dt;

  if (animState.progress >= 1) {
    // Move to next cell
    const nextPos = getNeighbor(animState.row, animState.col, animState.exitEdge);
    if (!nextPos) {
      // Hit grid boundary — stop
      animState.progress = 1;
      renderTrainAtProgress();
      SFX.crash();
      stopPlay();
      showToast('End of the line! 🛑');
      return;
    }

    const nextPiece = state.grid[nextPos.row]?.[nextPos.col];
    if (!nextPiece || SCENERY_TYPES.includes(nextPiece.type)) {
      // Dead end
      animState.progress = 1;
      renderTrainAtProgress();
      SFX.crash();
      stopPlay();
      showToast('Dead end! 🛑');
      return;
    }

    const newEntry = OPPOSITE[animState.exitEdge];
    const nextConns = getConnections(nextPiece.type, nextPiece.rotation);
    if (!nextConns.includes(newEntry)) {
      // Not connected
      animState.progress = 1;
      renderTrainAtProgress();
      SFX.crash();
      stopPlay();
      showToast('Track not connected! 🔧');
      return;
    }

    const newExit = getExitDir(nextPiece.type, nextPiece.rotation, newEntry);
    if (!newExit) {
      SFX.crash();
      stopPlay();
      showToast('Dead end! 🛑');
      return;
    }

    animState.row = nextPos.row;
    animState.col = nextPos.col;
    animState.cellsVisited++;

    // Loop detection: train returned to start after visiting enough cells
    if (!animState.loopCompleted && animState.cellsVisited >= 4 &&
        nextPos.row === animState.startRow && nextPos.col === animState.startCol) {
      animState.loopCompleted = true;
      triggerLoopCelebration();
    }
    animState.entryEdge = newEntry;
    animState.exitEdge = newExit;
    animState.path = getPathPoints(nextPiece.type, nextPiece.rotation, newEntry, newExit);
    animState.progress -= 1; // carry over

    // Train whistle at stations!
    if (nextPiece.type === 'station') {
      SFX.station();
      showToast('🚉 Toot toot!');
    }
  }

  renderTrainAtProgress();
  requestAnimationFrame(animateFrame);
}

function renderTrainAtProgress() {
  if (!animState || !animState.trainEl) return;

  const pos = interpolatePath(animState.path, Math.min(animState.progress, 1));
  const grid = document.getElementById('grid');
  const gridRect = grid.getBoundingClientRect();
  const containerRect = document.getElementById('grid-container').getBoundingClientRect();

  const cellX = animState.col * (cellSize + 1); // +1 for gap
  const cellY = animState.row * (cellSize + 1);

  const pixelX = cellX + pos.x * cellSize;
  const pixelY = cellY + pos.y * cellSize;

  const locoX = pixelX + gridRect.left - containerRect.left;
  const locoY = pixelY + gridRect.top - containerRect.top;

  animState.trainEl.style.left = locoX + 'px';
  animState.trainEl.style.top = locoY + 'px';

  // Top-down SVG faces NORTH (up) by default.
  // atan2 angle: East=0°, South=90°, North=-90°, West=±180°
  // To point our north-facing train in the direction of travel: rotate = angle + 90°
  const angleDeg = (pos.angle || 0) * (180 / Math.PI);
  animState.trainEl.style.transform = `translate(-50%, -50%) rotate(${angleDeg + 90}deg)`;

  // Update headlight position (night mode)
  const hl = document.getElementById('train-headlight');
  if (hl && isNightMode()) {
    const hlRadius = cellSize * 2;
    hl.style.width = hlRadius * 2 + 'px';
    hl.style.height = hlRadius * 2 + 'px';
    hl.style.left = (locoX - hlRadius) + 'px';
    hl.style.top = (locoY - hlRadius) + 'px';
    hl.style.background = 'radial-gradient(circle, rgba(255,230,100,0.35) 0%, rgba(255,210,60,0.15) 40%, transparent 70%)';
    hl.classList.add('active');
  } else if (hl) {
    hl.classList.remove('active');
  }

  // Update car positions via distance-based position history
  if (animState.carEls && animState.carEls.length > 0) {
    if (animState.lastRenderPos) {
      const dx = locoX - animState.lastRenderPos.x;
      const dy = locoY - animState.lastRenderPos.y;
      animState.cumulativeDistance += Math.sqrt(dx * dx + dy * dy);
    }
    animState.positionHistory.push({
      x: locoX, y: locoY,
      angle: angleDeg + 90,
      dist: animState.cumulativeDistance,
    });
    animState.lastRenderPos = { x: locoX, y: locoY };

    // Trim history to prevent memory growth
    if (animState.positionHistory.length > 600) {
      animState.positionHistory.splice(0, animState.positionHistory.length - 600);
    }

    const carSpacing = cellSize * 0.85;
    for (let i = 0; i < animState.carEls.length; i++) {
      const targetDist = animState.cumulativeDistance - (i + 1) * carSpacing;
      const entry = findHistoryEntry(animState.positionHistory, targetDist);
      if (entry) {
        animState.carEls[i].style.left = entry.x + 'px';
        animState.carEls[i].style.top = entry.y + 'px';
        animState.carEls[i].style.transform = 'translate(-50%, -50%) rotate(' + entry.angle + 'deg)';
        animState.carEls[i].style.opacity = '1';
      }
    }
  }
}

// ============================================================
// RANDOM TRACK GENERATOR (Feature #4)
// ============================================================
function generateRandomTrack() {
  if (state.playing) stopPlay();
  
  // Clear board
  state.grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  state.train = null;
  renderAllCells();
  
  SFX.generate();
  showToast('🎲 Generating track...');
  
  // Generate the loop path using random walk
  const path = generateLoopPath();
  
  if (!path || path.length < 4) {
    showToast('Generation failed, try again!');
    return;
  }
  
  // Animate placing pieces with cascading sound effect
  let delay = 0;
  const delayIncrement = 40; // ms between placements
  
  path.forEach((cell, index) => {
    setTimeout(() => {
      const { row, col, type, rotation } = cell;
      state.grid[row][col] = { type, rotation };
      renderCell(row, col);
      updateConnectionDots(row, col);
      SFX.build();
    }, delay);
    delay += delayIncrement;
  });
  
  // After all track pieces placed, refresh ALL connection dots (fixes stale dots from animated placement)
  setTimeout(() => {
    path.forEach(({ row, col }) => {
      updateConnectionDots(row, col);
    });
  }, delay + 50);
  
  // Add scenery after track is built
  setTimeout(() => {
    addRandomScenery();
    
    // Place train on a straight section
    setTimeout(() => {
      placeTrainOnLoop(path);
      autoSave();
      showToast('🚂 Track ready! Press Play!');
    }, 200);
  }, delay + 100);
}

function generateLoopPath() {
  // Pick random starting point (not on edges)
  const startRow = 2 + Math.floor(Math.random() * (ROWS - 4));
  const startCol = 2 + Math.floor(Math.random() * (COLS - 4));
  
  // Try multiple algorithms with different parameters for variety
  const algorithm = Math.floor(Math.random() * 3);
  
  if (algorithm === 0) {
    return generateSimpleRectLoop(startRow, startCol);
  } else if (algorithm === 1) {
    return generateWobblyLoop(startRow, startCol);
  } else {
    return generateSpiralLoop(startRow, startCol);
  }
}

function generateSimpleRectLoop(startRow, startCol) {
  // Generate a rectangular loop with slight variations
  const width = 4 + Math.floor(Math.random() * 4); // 4-7 cells wide
  const height = 3 + Math.floor(Math.random() * 3); // 3-5 cells tall
  
  const path = [];
  
  // Make sure it fits
  if (startCol + width >= COLS || startRow + height >= ROWS) {
    return generateSimpleRectLoop(Math.max(1, startRow - 1), Math.max(1, startCol - 1));
  }
  
  // Top edge (going right)
  for (let c = startCol; c < startCol + width; c++) {
    const isCorner = (c === startCol || c === startCol + width - 1);
    path.push({
      row: startRow,
      col: c,
      type: isCorner ? 'curve' : 'straight',
      rotation: isCorner ? (c === startCol ? 90 : 180) : 90
    });
  }
  
  // Right edge (going down)
  for (let r = startRow + 1; r < startRow + height; r++) {
    const isCorner = (r === startRow + height - 1);
    path.push({
      row: r,
      col: startCol + width - 1,
      type: isCorner ? 'curve' : 'straight',
      rotation: isCorner ? 270 : 0
    });
  }
  
  // Bottom edge (going left)
  for (let c = startCol + width - 2; c >= startCol; c--) {
    const isCorner = (c === startCol);
    path.push({
      row: startRow + height - 1,
      col: c,
      type: isCorner ? 'curve' : 'straight',
      rotation: isCorner ? 0 : 90
    });
  }
  
  // Left edge (going up)
  for (let r = startRow + height - 2; r > startRow; r--) {
    path.push({
      row: r,
      col: startCol,
      type: 'straight',
      rotation: 0
    });
  }
  
  return path;
}

function generateWobblyLoop(startRow, startCol) {
  // Generate a loop with random turns
  const visited = new Set();
  const path = [];
  let row = startRow, col = startCol;
  let dir = 'E'; // Start going east
  
  const maxSteps = 30;
  const turnChance = 0.3;
  
  for (let step = 0; step < maxSteps; step++) {
    const key = `${row},${col}`;
    
    // Check if we're back at start (loop complete)
    if (step > 6 && row === startRow && col === startCol) {
      break;
    }
    
    // If we've visited before, try to close the loop
    if (visited.has(key) && step < maxSteps - 3) {
      break;
    }
    
    visited.add(key);
    
    // Randomly turn or go straight
    const shouldTurn = Math.random() < turnChance;
    const prevDir = dir;
    
    if (shouldTurn) {
      dir = Math.random() < 0.5 ? ROTATE_MAP[dir] : ROTATE_MAP[ROTATE_MAP[ROTATE_MAP[dir]]];
    }
    
    // Add appropriate track piece
    const type = prevDir === dir ? 'straight' : 'curve';
    const rotation = getTrackRotation(prevDir, dir);
    
    path.push({ row, col, type, rotation });
    
    // Move to next cell
    const delta = DELTA[dir];
    row += delta.r;
    col += delta.c;
    
    // Boundary check - try to turn back
    if (row < 1 || row >= ROWS - 1 || col < 1 || col >= COLS - 1) {
      row -= delta.r;
      col -= delta.c;
      dir = OPPOSITE[dir];
    }
  }
  
  // If path is too short or didn't actually close back to start, use simple rect
  if (path.length < 8 || !(row === startRow && col === startCol)) {
    return generateSimpleRectLoop(startRow, startCol);
  }
  
  return path;
}

function generateSpiralLoop(startRow, startCol) {
  // Generate an inward spiral that then connects back
  const path = [];
  let row = startRow, col = startCol;
  
  // Create a larger rectangle then spiral inward
  const outerWidth = 6;
  const outerHeight = 5;
  
  if (startCol + outerWidth >= COLS || startRow + outerHeight >= ROWS) {
    return generateSimpleRectLoop(startRow, startCol);
  }
  
  // Outer loop
  // Top edge (including both corners)
  for (let c = 0; c < outerWidth; c++) {
    const isFirstCorner = (c === 0);
    const isLastCorner = (c === outerWidth - 1);
    const isCorner = isFirstCorner || isLastCorner;
    path.push({
      row: startRow,
      col: startCol + c,
      type: isCorner ? 'curve' : 'straight',
      rotation: isCorner ? (isFirstCorner ? 90 : 180) : 90
    });
  }
  
  // Right edge (including bottom-right corner)
  for (let r = 1; r < outerHeight; r++) {
    const isCorner = (r === outerHeight - 1);
    path.push({
      row: startRow + r,
      col: startCol + outerWidth - 1,
      type: isCorner ? 'curve' : 'straight',
      rotation: isCorner ? 270 : 0
    });
  }
  
  // Bottom edge (including bottom-left corner)
  for (let c = outerWidth - 2; c >= 0; c--) {
    const isCorner = (c === 0);
    path.push({
      row: startRow + outerHeight - 1,
      col: startCol + c,
      type: isCorner ? 'curve' : 'straight',
      rotation: isCorner ? 0 : 90
    });
  }
  
  // Left edge (no corners, both handled by top and bottom edges)
  for (let r = outerHeight - 2; r > 0; r--) {
    path.push({
      row: startRow + r,
      col: startCol,
      type: 'straight',
      rotation: 0
    });
  }
  
  return path;
}

function getTrackRotation(fromDir, toDir) {
  // Straight pieces
  if (fromDir === toDir) {
    return (fromDir === 'N' || fromDir === 'S') ? 0 : 90;
  }
  
  // Curves - convert travel directions to edge connections
  // fromDir = direction we were traveling, so entry edge = OPPOSITE[fromDir]
  // toDir = direction we're now traveling, so exit edge = toDir
  const entryEdge = OPPOSITE[fromDir];
  const exitEdge = toDir;
  
  // Curve at rotation 0 connects N-E edges
  const curveMap = {
    'NE': 0, 'EN': 0,
    'ES': 90, 'SE': 90,
    'SW': 180, 'WS': 180,
    'WN': 270, 'NW': 270,
  };
  
  return curveMap[entryEdge + exitEdge] || 0;
}

function addRandomScenery() {
  const emptyCells = [];
  
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!state.grid[r][c]) {
        emptyCells.push({ row: r, col: c });
      }
    }
  }
  
  // Fill 30-50% of empty cells with scenery
  const targetFill = 0.3 + Math.random() * 0.2;
  const numScenery = Math.floor(emptyCells.length * targetFill);
  
  // Shuffle and pick random cells
  for (let i = 0; i < numScenery && i < emptyCells.length; i++) {
    const idx = Math.floor(Math.random() * emptyCells.length);
    const { row, col } = emptyCells[idx];
    emptyCells.splice(idx, 1);
    
    // Random scenery type
    const types = ['tree', 'house', 'cow'];
    const type = types[Math.floor(Math.random() * types.length)];
    
    // Weight towards more trees
    const weighted = Math.random();
    const finalType = weighted < 0.6 ? 'tree' : (weighted < 0.8 ? 'house' : 'cow');
    
    state.grid[row][col] = { type: finalType, rotation: 0 };
    
    // Stagger the scenery rendering
    setTimeout(() => {
      renderCell(row, col);
    }, i * 15);
  }
}

function placeTrainOnLoop(path) {
  // Find a straight section in the path
  for (const cell of path) {
    if (cell.type === 'straight') {
      state.train = { row: cell.row, col: cell.col };
      renderCell(cell.row, cell.col);
      return;
    }
  }
  
  // If no straight section, place on first track piece
  if (path.length > 0) {
    state.train = { row: path[0].row, col: path[0].col };
    renderCell(path[0].row, path[0].col);
  }
}

// ============================================================
// PERSISTENCE (Auto-save, Save Slots, Thumbnails)
// ============================================================
const AUTOSAVE_KEY = 'trainTracks_autosave';
const SLOT_KEY_PREFIX = 'trainTracks_slot_';

function serializeState() {
  return JSON.stringify({
    grid: state.grid,
    train: state.train,
    trainDir: state.trainDir,
    cars: state.cars,
  });
}

function deserializeState(json) {
  try {
    const data = JSON.parse(json);
    if (data && Array.isArray(data.grid)) {
      state.grid = data.grid;
      state.train = data.train || null;
      state.trainDir = data.trainDir || 'E';
      state.cars = Array.isArray(data.cars) ? data.cars : [];
      state.undoStack = [];
      return true;
    }
  } catch (e) { /* ignore parse errors */ }
  return false;
}

function autoSave() {
  try {
    localStorage.setItem(AUTOSAVE_KEY, serializeState());
  } catch (e) { /* localStorage full or unavailable */ }
}

function autoLoad() {
  try {
    const saved = localStorage.getItem(AUTOSAVE_KEY);
    if (saved) return deserializeState(saved);
  } catch (e) { /* ignore */ }
  return false;
}

function clearAutoSave() {
  try { localStorage.removeItem(AUTOSAVE_KEY); } catch (e) {}
}

// Mini thumbnail: draws a small representation of the grid to a canvas
function renderThumbnail(canvas, gridData, trainData) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width = 120;
  const h = canvas.height = 80;
  const cw = w / COLS;
  const ch = h / ROWS;

  // Grass background (respects night mode)
  ctx.fillStyle = isNightMode() ? '#2E4A3A' : '#7CB342';
  ctx.fillRect(0, 0, w, h);

  if (!gridData) return;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const piece = gridData[r]?.[c];
      if (!piece) continue;
      const x = c * cw, y = r * ch;

      if (SCENERY_TYPES.includes(piece.type)) {
        // Scenery: subtle green dot
        ctx.fillStyle = '#558B2F';
        ctx.beginPath();
        ctx.arc(x + cw / 2, y + ch / 2, Math.min(cw, ch) * 0.3, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Track: brown square
        ctx.fillStyle = '#5D4037';
        const pad = 1;
        ctx.fillRect(x + pad, y + pad, cw - pad * 2, ch - pad * 2);

        // Station marker
        if (piece.type === 'station') {
          ctx.fillStyle = '#E0E0E0';
          ctx.fillRect(x + cw * 0.6, y + pad, cw * 0.35, ch - pad * 2);
        }
      }
    }
  }

  // Train: red dot
  if (trainData) {
    ctx.fillStyle = '#E53935';
    const tx = trainData.col * cw + cw / 2;
    const ty = trainData.row * ch + ch / 2;
    ctx.beginPath();
    ctx.arc(tx, ty, Math.min(cw, ch) * 0.4, 0, Math.PI * 2);
    ctx.fill();
    // White highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(tx - 1, ty - 1, Math.min(cw, ch) * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }
}

function formatTimestamp(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const month = months[d.getMonth()];
  const day = d.getDate();
  const hour = d.getHours();
  const min = String(d.getMinutes()).padStart(2, '0');
  const ampm = hour >= 12 ? 'PM' : 'AM';
  const h12 = hour % 12 || 12;
  return `${month} ${day}, ${h12}:${min} ${ampm}`;
}

function getSlotData(slotNum) {
  try {
    const raw = localStorage.getItem(SLOT_KEY_PREFIX + slotNum);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveToSlot(slotNum) {
  const nameInput = document.querySelector(`#slot-name-${slotNum}`);
  const name = nameInput ? nameInput.value.trim() : `Slot ${slotNum}`;
  const data = {
    name: name || `Slot ${slotNum}`,
    timestamp: Date.now(),
    grid: state.grid,
    train: state.train,
    trainDir: state.trainDir,
    cars: state.cars,
  };
  try {
    localStorage.setItem(SLOT_KEY_PREFIX + slotNum, JSON.stringify(data));
    SFX.place();
    showToast('💾 Saved!');
    renderSaveSlots();
  } catch (e) {
    showToast('Save failed — storage full!');
  }
}

function loadFromSlot(slotNum) {
  const data = getSlotData(slotNum);
  if (!data) return;
  saveUndo();
  state.grid = data.grid;
  state.train = data.train || null;
  state.trainDir = data.trainDir || 'E';
  state.cars = Array.isArray(data.cars) ? data.cars : [];
  renderAllCells();
  autoSave();
  SFX.generate();
  showToast('📂 Loaded!');
  closeSaveModal();
}

function deleteSlot(slotNum) {
  try {
    localStorage.removeItem(SLOT_KEY_PREFIX + slotNum);
    showToast('🗑️ Slot cleared!');
    SFX.remove();
    renderSaveSlots();
  } catch (e) {}
}

function escapeAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSaveSlots() {
  const container = document.getElementById('save-slots');
  if (!container) return;
  container.innerHTML = '';

  for (let i = 1; i <= 3; i++) {
    const data = getSlotData(i);
    const slot = document.createElement('div');
    slot.className = 'save-slot';

    const canvas = document.createElement('canvas');
    canvas.id = `slot-canvas-${i}`;
    renderThumbnail(canvas, data ? data.grid : null, data ? data.train : null);

    const info = document.createElement('div');
    info.className = 'slot-info';

    if (data) {
      const safeName = escapeAttr(data.name || 'Slot ' + i);
      info.innerHTML = `
        <input class="slot-name" id="slot-name-${i}" value="${safeName}" maxlength="20">
        <div class="slot-time">${formatTimestamp(data.timestamp)}</div>
        <div class="slot-actions">
          <button class="btn-save-slot" onclick="saveToSlot(${i})">💾 Save</button>
          <button class="btn-load-slot" onclick="loadFromSlot(${i})">📂 Load</button>
          <button class="btn-delete-slot" onclick="deleteSlot(${i})">🗑️</button>
        </div>
      `;
    } else {
      info.innerHTML = `
        <input class="slot-name" id="slot-name-${i}" value="Slot ${i}" maxlength="20">
        <div class="slot-empty">Empty</div>
        <div class="slot-actions">
          <button class="btn-save-slot" onclick="saveToSlot(${i})">💾 Save</button>
        </div>
      `;
    }

    slot.appendChild(canvas);
    slot.appendChild(info);
    container.appendChild(slot);
  }
}

function openSaveModal() {
  if (state.playing) return;
  renderSaveSlots();
  document.getElementById('save-overlay').classList.add('open');
}

function closeSaveModal() {
  document.getElementById('save-overlay').classList.remove('open');
}

function closeSaveModalOutside(e) {
  if (e.target === document.getElementById('save-overlay')) {
    closeSaveModal();
  }
}

// ============================================================
// SIZING
// ============================================================
function calculateSize() {
  const sidebarHidden = document.getElementById('app').classList.contains('sidebar-hidden');
  const sidebarW = sidebarHidden ? 0 : parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  const availW = window.innerWidth - sidebarW - 40;
  const availH = window.innerHeight - 120;
  cellSize = Math.floor(Math.min(availW / COLS, availH / ROWS));
  cellSize = Math.max(40, Math.min(cellSize, 80));
  document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
}

// ============================================================
// INIT
// ============================================================
function init() {
  calculateSize();
  initGrid();

  // Restore night mode preference
  restoreNightMode();

  // Restore saved state before first render
  const restored = autoLoad();

  renderAllCells();

  if (restored) {
    showToast('Welcome back! 🚂');
  }

  // Render palette SVGs
  document.querySelectorAll('.palette-piece').forEach(el => {
    const type = el.dataset.type;
    const svg = createPaletteSVG(type);
    el.insertBefore(svg, el.firstChild);
  });

  initDragAndDrop();

  // Update smoke rate when speed slider changes
  document.getElementById('speed-slider').addEventListener('input', updateSmokeRate);

  window.addEventListener('resize', () => {
    calculateSize();
    initGrid();
    renderAllCells();
    // Re-render palette
    document.querySelectorAll('.palette-piece').forEach(el => {
      const type = el.dataset.type;
      el.querySelectorAll('svg, div:not(.label)').forEach(ch => {
        if (!ch.classList.contains('label')) ch.remove();
      });
      const svg = createPaletteSVG(type);
      el.insertBefore(svg, el.firstChild);
    });
  });

  if (!restored) {
    showToast('Drag track pieces to build! 🚂');
  }
}

init();
</script>
