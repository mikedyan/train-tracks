<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚂 Train Tracks</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sidebar-w: 90px;
  --cell-size: 60px;
  --grass: #7CB342;
  --grass-dark: #689F38;
  --grass-hover: #85BB4A;
  --wood: #8D6E63;
  --wood-light: #BCAAA4;
  --track: #5D4037;
  --track-light: #A1887F;
  --sky: #E8F5E9;
  --sky-gradient-start: #E8F5E9;
  --sky-gradient-end: #C8E6C9;
  --sidebar-top: #6D4C41;
  --sidebar-bottom: #5D4037;
  --header-color: #3E2723;
  --accent: #FF6B6B;
  --play-green: #4CAF50;
  --stop-red: #F44336;
  --house-glow: none;
  --star-bg: none;
}

body.night-mode {
  --grass: #2E4A3A;
  --grass-dark: #1E3A2A;
  --grass-hover: #3A5A4A;
  --sky: #0D1B2A;
  --sky-gradient-start: #0D1B2A;
  --sky-gradient-end: #1B2838;
  --sidebar-top: #1A2332;
  --sidebar-bottom: #0F1923;
  --header-color: #B0BEC5;
  --house-glow: 0 0 12px 4px rgba(255, 200, 50, 0.6);
  --star-bg:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 25% 42%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1.5px 1.5px at 45% 8%, rgba(255,255,255,0.9), transparent),
    radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 75% 18%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 88% 48%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 35% 78%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 55% 58%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 70% 72%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 92% 82%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 40% 92%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 82% 5%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 50% 25%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 20% 50%, rgba(255,255,255,0.5), transparent);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: var(--sky);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  transition: background 0.5s ease;
}

#app {
  display: flex;
  width: 100%; height: 100%;
}

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w);
  background: linear-gradient(180deg, var(--sidebar-top), var(--sidebar-bottom));
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  gap: 6px;
  box-shadow: 2px 0 8px rgba(0,0,0,0.2);
  z-index: 10;
  overflow-y: auto;
  transition: width 0.25s ease, padding 0.25s ease, opacity 0.2s ease, background 0.5s ease;
}

#app.sidebar-hidden #sidebar {
  width: 0;
  padding: 0;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
}

#sidebar-toggle {
  position: fixed;
  left: var(--sidebar-w);
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 48px;
  background: var(--sidebar-bottom);
  border: none;
  border-radius: 0 8px 8px 0;
  color: white;
  font-size: 14px;
  cursor: pointer;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 2px 0 6px rgba(0,0,0,0.2);
  transition: left 0.25s ease, background 0.5s ease;
  padding: 0;
}

#sidebar-toggle:hover {
  background: var(--sidebar-top);
}

#app.sidebar-hidden #sidebar-toggle {
  left: 0;
}

#sidebar h2 {
  color: #FFCC80;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 4px 0 2px;
}

.palette-piece {
  width: 64px; height: 64px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  transition: transform 0.15s, background 0.15s;
  position: relative;
}

.palette-piece:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.08);
}

.palette-piece:active { cursor: grabbing; }

.palette-piece .label {
  position: absolute;
  bottom: 2px;
  font-size: 8px;
  color: rgba(255,255,255,0.7);
  text-align: center;
  width: 100%;
}

.palette-train {
  background: rgba(255,200,0,0.2) !important;
  border: 2px dashed rgba(255,200,0,0.5);
}

.palette-car {
  background: rgba(139,195,74,0.2) !important;
  border: 2px dashed rgba(139,195,74,0.5);
}

.palette-divider {
  width: 50px;
  height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 2px 0;
}

/* MAIN AREA */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  gap: 10px;
  overflow: hidden;
  background-image: var(--star-bg);
  background-size: 100% 100%;
  transition: background-color 0.5s ease;
}

#header {
  display: flex;
  align-items: center;
  gap: 10px;
}

#header h1 {
  font-size: 22px;
  font-weight: 800;
  color: var(--header-color);
  transition: color 0.5s ease;
}

/* GRID */
#grid-container {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15), inset 0 0 0 3px rgba(0,0,0,0.1);
  transition: box-shadow 0.5s ease;
}

body.night-mode #grid-container {
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 0 0 3px rgba(0,0,0,0.3);
}

#grid {
  display: grid;
  background: var(--grass-dark);
  gap: 1px;
  transition: background 0.5s ease;
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  background: var(--grass);
  position: relative;
  transition: background 0.15s;
}

.cell:hover { background: var(--grass-hover); }
.cell.highlight { background: #A5D64E; box-shadow: inset 0 0 0 2px #FFF; }
.cell .ghost-preview {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.5;
  pointer-events: none;
  z-index: 3;
}
.cell .ghost-preview-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.5;
  pointer-events: none;
  z-index: 3;
}
.cell.highlight.ghost-match {
  background: #A5D64E;
  box-shadow: inset 0 0 0 3px rgba(76, 175, 80, 0.9), inset 0 0 12px rgba(76, 175, 80, 0.3);
}
.cell.highlight.ghost-mismatch {
  background: #E8A5A5;
  box-shadow: inset 0 0 0 3px rgba(244, 67, 54, 0.9), inset 0 0 12px rgba(244, 67, 54, 0.3);
}
.cell.occupied { cursor: pointer; }
.cell.has-train { z-index: 5; }

.cell svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.cell .train-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: calc(var(--cell-size) * 0.6);
  z-index: 6;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  transition: transform 0.1s;
}

.cell .train-svg {
  position: absolute;
  top: 5%; left: 5%;
  width: 90%; height: 90%;
  z-index: 6;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  pointer-events: auto;
  cursor: grab;
  transition: transform 0.2s ease-out;
}

.cell .train-svg:active {
  cursor: grabbing;
}

.cell .train-svg.snapping-back {
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.cell .scenery-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: calc(var(--cell-size) * 0.55);
  pointer-events: none;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
}

/* Connection glow */
.cell .connection-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #76FF03;
  box-shadow: 0 0 6px #76FF03;
  z-index: 4;
  opacity: 0;
  transition: opacity 0.3s;
}
.cell .connection-dot.connected { opacity: 1; }
.cell .connection-dot.disconnected { background: #FF5252; box-shadow: 0 0 6px #FF5252; opacity: 0.7; }

/* Auto-connect pulse animation */
@keyframes connect-pulse {
  0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
  40% { transform: translateX(-50%) scale(2.2); box-shadow: 0 0 14px #76FF03, 0 0 24px rgba(118,255,3,0.4); }
  100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
}
@keyframes connect-pulse-y {
  0% { transform: translateY(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
  40% { transform: translateY(-50%) scale(2.2); box-shadow: 0 0 14px #76FF03, 0 0 24px rgba(118,255,3,0.4); }
  100% { transform: translateY(-50%) scale(1); box-shadow: 0 0 6px #76FF03; }
}
.cell .connection-dot.pulsing.n,
.cell .connection-dot.pulsing.s { animation: connect-pulse 0.6s ease-out; }
.cell .connection-dot.pulsing.e,
.cell .connection-dot.pulsing.w { animation: connect-pulse-y 0.6s ease-out; }
.cell .connection-dot.n { top: -3px; left: 50%; transform: translateX(-50%); }
.cell .connection-dot.s { bottom: -3px; left: 50%; transform: translateX(-50%); }
.cell .connection-dot.e { right: -3px; top: 50%; transform: translateY(-50%); }
.cell .connection-dot.w { left: -3px; top: 50%; transform: translateY(-50%); }

/* CONTROLS */
#controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-play { background: var(--play-green); color: white; box-shadow: 0 3px 10px rgba(76,175,80,0.4); }
.btn-stop { background: var(--stop-red); color: white; box-shadow: 0 3px 10px rgba(244,67,54,0.4); }
.btn-clear { background: #FF9800; color: white; box-shadow: 0 3px 10px rgba(255,152,0,0.3); }
.btn-undo { background: #9E9E9E; color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }

.speed-control {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--header-color);
  font-weight: 700;
  font-size: 13px;
  transition: color 0.5s ease;
}

.speed-control input[type=range] {
  width: 80px;
  accent-color: var(--play-green);
}

/* GHOST (dragged piece) */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  opacity: 0.85;
  transform: translate(-50%, -50%) scale(1.1);
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  transition: opacity 0.1s;
}

/* TRASH ZONE */
#trash-zone {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(244,67,54,0.15);
  border: 2px dashed rgba(244,67,54,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 50;
  pointer-events: none;
}

#trash-zone.visible { opacity: 1; pointer-events: auto; }
#trash-zone.hover { background: rgba(244,67,54,0.3); transform: scale(1.15); }

/* TOAST */
#toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
  z-index: 200;
  transition: transform 0.3s ease;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* TRAIN REPLACEMENT FLASH */
@keyframes train-replace-flash {
  0% { background: rgba(255, 200, 0, 0.8); transform: scale(1.2); }
  50% { background: rgba(255, 200, 0, 0.4); transform: scale(1.1); }
  100% { background: var(--grass); transform: scale(1); }
}
.cell.replacing-train {
  animation: train-replace-flash 0.5s ease-out;
}

/* POOF ANIMATION (right-click removal) */
@keyframes poof {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  50% {
    opacity: 0.8;
    transform: translate(-50%, -50%) scale(1.3);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.6);
  }
}
.poof-effect {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: calc(var(--cell-size) * 0.8);
  pointer-events: none;
  z-index: 10;
  animation: poof 0.5s ease-out forwards;
}

/* SAVE MODAL */
#save-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
#save-overlay.open { display: flex; }

#save-modal {
  background: #FFF;
  border-radius: 16px;
  padding: 24px;
  width: 380px;
  max-width: 90vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  position: relative;
}

#save-modal h2 {
  font-size: 20px;
  color: #3E2723;
  margin-bottom: 16px;
  text-align: center;
}

#save-modal .close-btn {
  position: absolute;
  top: 12px; right: 14px;
  background: none; border: none;
  font-size: 22px; cursor: pointer;
  color: #999;
  line-height: 1;
}
#save-modal .close-btn:hover { color: #333; }

.save-slot {
  border: 2px solid #E0E0E0;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  align-items: center;
  transition: border-color 0.2s;
}
.save-slot:hover { border-color: #BDBDBD; }

.save-slot canvas {
  width: 100px;
  height: 67px;
  border-radius: 6px;
  background: #E8F5E9;
  flex-shrink: 0;
}

.save-slot .slot-info {
  flex: 1;
  min-width: 0;
}

.save-slot .slot-name {
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  border: 1px solid #E0E0E0;
  border-radius: 6px;
  padding: 4px 8px;
  width: 100%;
  outline: none;
  color: #3E2723;
}
.save-slot .slot-name:focus { border-color: #4CAF50; }

.save-slot .slot-time {
  font-size: 11px;
  color: #999;
  margin-top: 4px;
}

.save-slot .slot-empty {
  font-size: 12px;
  color: #BDBDBD;
  font-style: italic;
}

.save-slot .slot-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}

.save-slot .slot-actions button {
  padding: 4px 10px;
  border: none;
  border-radius: 6px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  transition: transform 0.1s;
}
.save-slot .slot-actions button:hover { transform: scale(1.05); }
.save-slot .slot-actions .btn-save-slot { background: #4CAF50; color: white; }
.save-slot .slot-actions .btn-load-slot { background: #2196F3; color: white; }
.save-slot .slot-actions .btn-delete-slot { background: #F44336; color: white; }

/* SMOKE PARTICLES */
@keyframes smoke-rise {
  0% { opacity: 0.6; transform: translate(var(--smoke-dx, 0px), 0px) scale(1); }
  100% { opacity: 0; transform: translate(var(--smoke-dx, 0px), -40px) scale(1.8); }
}
.smoke-particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(200, 200, 200, 0.7);
  pointer-events: none;
  z-index: 55;
  animation: smoke-rise var(--smoke-duration, 0.8s) ease-out forwards;
}

/* CONFETTI PARTICLES */
@keyframes confetti-burst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  60% { opacity: 0.8; }
  100% { opacity: 0; transform: translate(var(--confetti-dx, 50px), var(--confetti-dy, -50px)) scale(0.4); }
}
.confetti-particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 60;
  animation: confetti-burst 1.2s ease-out forwards;
}

/* CAR RENDERING */
.cell .car-svg {
  position: absolute;
  top: 5%; left: 5%;
  width: 90%; height: 90%;
  z-index: 6;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  pointer-events: auto;
  cursor: pointer;
}

.car-count-badge {
  position: absolute;
  bottom: 2px;
  right: 2px;
  font-size: 9px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 1px 4px;
  border-radius: 6px;
  z-index: 8;
  pointer-events: none;
  white-space: nowrap;
}

/* HOUSE GLOW (Night Mode) */
body.night-mode .cell .scenery-emoji {
  transition: text-shadow 0.5s ease;
}

/* HEADLIGHT GLOW (Night Mode) */
#train-headlight {
  position: absolute;
  width: 0; height: 0;
  pointer-events: none;
  z-index: 45;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s ease;
}

body.night-mode #train-headlight.active {
  opacity: 1;
}

/* Night mode toggle button */
.btn-night {
  background: #607D8B;
  color: white;
  box-shadow: 0 3px 10px rgba(96,125,139,0.3);
}

body.night-mode .btn-night {
  background: #263238;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
}

/* PLAYING STATE */
#app.playing .cell { cursor: default; }
#app.playing .cell:hover { background: var(--grass); }
#app.playing #sidebar { opacity: 0.5; pointer-events: none; }

/* RESPONSIVE */
@media (max-width: 768px) {
  :root { --sidebar-w: 70px; }
  .palette-piece { width: 54px; height: 54px; }
  #header h1 { font-size: 18px; }
  .btn { padding: 6px 14px; font-size: 12px; }
  #sidebar-toggle { width: 28px; height: 56px; font-size: 16px; }
}
</style>
</head>
<body>
<div id="app">
  <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle palette">◀</button>
  <div id="sidebar">
    <h2>Tracks</h2>
    <div class="palette-piece" data-type="straight"><div class="label">Straight</div></div>
    <div class="palette-piece" data-type="curve"><div class="label">Curve</div></div>
    <div class="palette-piece" data-type="tjunction"><div class="label">T-Split</div></div>
    <div class="palette-piece" data-type="crossover"><div class="label">Cross</div></div>
    <div class="palette-piece" data-type="bridge"><div class="label">Bridge</div></div>
    <div class="palette-piece" data-type="station"><div class="label">Station</div></div>
    <div class="palette-divider"></div>
    <h2>Train</h2>
    <div class="palette-piece palette-train" data-type="train"><div class="label">Loco</div></div>
    <div class="palette-divider"></div>
    <h2>Cars</h2>
    <div class="palette-piece palette-car" data-type="freight"><div class="label">Freight</div></div>
    <div class="palette-piece palette-car" data-type="passenger"><div class="label">Passenger</div></div>
    <div class="palette-piece palette-car" data-type="caboose"><div class="label">Caboose</div></div>
    <div class="palette-divider"></div>
    <h2>Scenery</h2>
    <div class="palette-piece" data-type="tree"><div class="label">Tree</div></div>
    <div class="palette-piece" data-type="house"><div class="label">House</div></div>
    <div class="palette-piece" data-type="cow"><div class="label">Cow</div></div>
  </div>
  <div id="main">
    <div id="header">
      <h1>🚂 Train Tracks</h1>
    </div>
    <div id="grid-container">
      <div id="grid"></div>
      <div id="train-headlight"></div>
    </div>
    <div id="controls">
      <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶️ Play</button>

<script>
// ============================================================
// SOUND ENGINE (Web Audio API — no external files)
// ============================================================
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq, duration, type = 'sine', volume = 0.15, delay = 0) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration);
}

function playNoise(duration, volume = 0.08) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 0.5;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  src.start();
  src.stop(ctx.currentTime + duration);
}

const SFX = {

// Chug rhythm during play
let chugInterval = null;
function startChugLoop() {
  stopChugLoop();
  let beat = 0;
  chugInterval = setInterval(() => {
    if (!state.playing || !soundEnabled) { stopChugLoop(); return; }
    const speed = parseFloat(document.getElementById('speed-slider').value) || 1;
    SFX.chug();
    // Alternate louder/softer for rhythm
    if (beat % 2 === 0) playNote(100, 0.04, 'square', 0.03);
    beat++;
  }, Math.max(80, 300 / (parseFloat(document.getElementById('speed-slider')?.value) || 1)));
}
function stopChugLoop() {
  if (chugInterval) { clearInterval(chugInterval); chugInterval = null; }
}

// ============================================================
// NIGHT MODE
// ============================================================
const NIGHT_MODE_KEY = 'trainTracks_nightMode';

function isNightMode() {
  return document.body.classList.contains('night-mode');
}

function toggleNightMode() {
  const night = !isNightMode();
  document.body.classList.toggle('night-mode', night);
  document.getElementById('btn-night').textContent = night ? '🌙' : '☀️';
  // Update house glows
  updateHouseGlows();
  // Update headlight visibility
  updateHeadlightVisibility();
  try { localStorage.setItem(NIGHT_MODE_KEY, night ? '1' : '0'); } catch (e) {}
}

function restoreNightMode() {
  try {
    const val = localStorage.getItem(NIGHT_MODE_KEY);
    if (val === '1') {
      document.body.classList.add('night-mode');
      document.getElementById('btn-night').textContent = '🌙';
    }
  } catch (e) {}
}

function updateHouseGlows() {
  const night = isNightMode();
  document.querySelectorAll('.cell .scenery-emoji').forEach(el => {
    if (el.textContent === '🏠') {
      el.style.textShadow = night ? '0 0 12px rgba(255, 200, 50, 0.7), 0 0 24px rgba(255, 180, 30, 0.4)' : 'none';
    }
  });
}

function updateHeadlightVisibility() {
  const hl = document.getElementById('train-headlight');
  if (!hl) return;
  if (isNightMode() && state.playing) {
    hl.classList.add('active');
  } else {
    hl.classList.remove('active');
  }
}

// ============================================================
// CONSTANTS
// ============================================================
const COLS = 12;
const ROWS = 8;
const OPPOSITE = { N: 'S', S: 'N', E: 'W', W: 'E' };
const DELTA = { N: { r: -1, c: 0 }, S: { r: 1, c: 0 }, E: { r: 0, c: 1 }, W: { r: 0, c: -1 } };
const ROTATE_MAP = { N: 'E', E: 'S', S: 'W', W: 'N' };

const TRACK_TYPES = ['straight', 'curve', 'tjunction', 'crossover', 'bridge', 'station'];
const SCENERY_TYPES = ['tree', 'house', 'cow'];
const SCENERY_EMOJI = { tree: '🌲', house: '🏠', cow: '🐄' };
const CAR_TYPES = ['freight', 'passenger', 'caboose'];
const MAX_CARS = 5;

// Base connections at rotation 0
const BASE_CONNECTIONS = {
  straight: ['N', 'S'],
  curve:    ['N', 'E'],
  tjunction:['N', 'E', 'S'],
  crossover:['N', 'S', 'E', 'W'],
  bridge:   ['N', 'S', 'E', 'W'],
  station:  ['N', 'S'],
};

// Through-routes for crossover/bridge (pairs that form continuous paths)
const THROUGH_ROUTES = {
  crossover: [['N','S'], ['E','W']],
  bridge:    [['N','S'], ['E','W']],
};

// ============================================================
// STATE
// ============================================================
const state = {
  grid: Array.from({ length: ROWS }, () => Array(COLS).fill(null)),
  // Each cell: { type, rotation } or null
  train: null, // { row, col }
  trainDir: 'E', // initial facing
  cars: [], // [{type: 'freight'|'passenger'|'caboose'}]
  playing: false,
  speed: 1.2,
  undoStack: [],
};

let cellSize = 60;
let animState = null; // train animation state

// ============================================================
// UTILITY
// ============================================================
function rotateDir(dir, times) {
  let d = dir;
  for (let i = 0; i < times; i++) d = ROTATE_MAP[d];
  return d;
}

function getConnections(type, rotation) {
  const base = BASE_CONNECTIONS[type];
  if (!base) return [];
  const steps = (((rotation % 360) + 360) % 360) / 90;
  return base.map(d => rotateDir(d, steps));
}

function getExitDir(type, rotation, entryEdge) {
  const conns = getConnections(type, rotation);
  if (!conns.includes(entryEdge)) return null;

  // Crossover/Bridge: must stay on same axis
  if (type === 'crossover' || type === 'bridge') {
    const steps = (((rotation % 360) + 360) % 360) / 90;
    for (const route of THROUGH_ROUTES[type]) {
      const rotated = route.map(d => rotateDir(d, steps));
      if (rotated.includes(entryEdge)) {
        return rotated.find(d => d !== entryEdge);
      }
    }
    return null;
  }

  // T-junction: prefer straight-through, else turn
  if (type === 'tjunction') {
    const opposite = OPPOSITE[entryEdge];
    if (conns.includes(opposite)) return opposite;
    return conns.find(d => d !== entryEdge) || null;
  }

  // Simple pieces (straight, curve, station): one exit
  return conns.find(d => d !== entryEdge) || null;
}

function getNeighbor(row, col, dir) {
  const d = DELTA[dir];
  const nr = row + d.r, nc = col + d.c;
  if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return null;
  return { row: nr, col: nc };
}

function isConnectedAt(row, col, dir) {
  const piece = state.grid[row][col];
  if (!piece) return false;
  return getConnections(piece.type, piece.rotation).includes(dir);
}

function neighborConnected(row, col, dir) {
  const nb = getNeighbor(row, col, dir);
  if (!nb) return false;
  const piece = state.grid[nb.row][nb.col];
  if (!piece) return false;
  return getConnections(piece.type, piece.rotation).includes(OPPOSITE[dir]);
}

// Smart Auto-Connect: find the rotation that maximizes neighbor connections
function findBestRotation(row, col, type) {
  let bestRotation = 0;
  let bestScore = 0;

  for (const rotation of [0, 90, 180, 270]) {
    const conns = getConnections(type, rotation);
    let score = 0;
    for (const dir of conns) {
      const nb = getNeighbor(row, col, dir);
      if (!nb) continue;
      const nbPiece = state.grid[nb.row][nb.col];
      if (!nbPiece || SCENERY_TYPES.includes(nbPiece.type)) continue;
      const nbConns = getConnections(nbPiece.type, nbPiece.rotation);
      if (nbConns.includes(OPPOSITE[dir])) {
        score++;
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestRotation = rotation;
    }
  }

  return { rotation: bestRotation, score: bestScore };
}

// ============================================================
// TRACK SVG RENDERING
// ============================================================
function createTrackSVG(type) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 60 60');
  svg.setAttribute('fill', 'none');

  const trackColor = '#5D4037';
  const trackWidth = 10;
  const tieColor = '#8D6E63';
  const tieWidth = 3;
  const railColor = '#4E342E';

  function line(x1,y1,x2,y2,color,width,cap='round') {
    const l = document.createElementNS(ns,'line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke',color);
    l.setAttribute('stroke-width',width);
    l.setAttribute('stroke-linecap',cap);
    return l;
  }

  function arc(sx,sy,ex,ey,r,sweep,color,width,largeArc) {
    const p = document.createElementNS(ns,'path');
    p.setAttribute('d', `M${sx},${sy} A${r},${r} 0 ${largeArc||0},${sweep} ${ex},${ey}`);
    p.setAttribute('stroke', color);
    p.setAttribute('stroke-width', width);
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('fill', 'none');
    return p;
  }

  function circle(cx,cy,r,color) {
    const c = document.createElementNS(ns,'circle');
    c.setAttribute('cx',cx); c.setAttribute('cy',cy);
    c.setAttribute('r',r); c.setAttribute('fill',color);
    return c;
  }

  function rect(x,y,w,h,color,rx=0) {
    const r2 = document.createElementNS(ns,'rect');
    r2.setAttribute('x',x); r2.setAttribute('y',y);
    r2.setAttribute('width',w); r2.setAttribute('height',h);
    r2.setAttribute('fill',color);
    if(rx) r2.setAttribute('rx',rx);
    return r2;
  }

  switch(type) {
    case 'straight':
      // Ties
      [10,22,34,46].forEach(y => svg.appendChild(line(20,y,40,y,tieColor,tieWidth,'butt')));
      // Rails
      svg.appendChild(line(24,0,24,60,railColor,2.5));
      svg.appendChild(line(36,0,36,60,railColor,2.5));
      // Track bed
      svg.appendChild(line(30,0,30,60,'#A1887F',12));
      svg.appendChild(line(30,0,30,60,trackColor,8));
      break;

    case 'curve':
      // Quarter-circle arc centered at corner (60,0), r=30, sweep=0 (CCW)
      // 4 of these form a perfect circle when tiles meet at a shared corner
      svg.appendChild(arc(30,0, 60,30, 30, 0, '#A1887F',12));
      svg.appendChild(arc(30,0, 60,30, 30, 0, trackColor,8));
      // Concentric rail arcs (same center)
      svg.appendChild(arc(26,0, 60,34, 34, 0, railColor,1.5));   // outer rail
      svg.appendChild(arc(34,0, 60,26, 26, 0, railColor,1.5));   // inner rail
      break;

    case 'tjunction':
      // Main straight (N→S)
      svg.appendChild(line(30,0,30,60,'#A1887F',12));
      svg.appendChild(line(30,0,30,60,trackColor,8));
      // Branch (→E)
      svg.appendChild(line(30,30,60,30,'#A1887F',12));
      svg.appendChild(line(30,30,60,30,trackColor,8));
      // Junction dot
      svg.appendChild(circle(30,30,5,'#FFAB40'));
      break;

    case 'crossover':
      // N-S
      svg.appendChild(line(30,0,30,60,'#A1887F',12));
      svg.appendChild(line(30,0,30,60,trackColor,8));
      // E-W
      svg.appendChild(line(0,30,60,30,'#A1887F',12));
      svg.appendChild(line(0,30,60,30,trackColor,8));
      // Center dot
      svg.appendChild(circle(30,30,4,'#FFAB40'));
      break;

    case 'bridge':
      // Under track (E-W) — draw first
      svg.appendChild(line(0,30,60,30,'#A1887F',12));
      svg.appendChild(line(0,30,60,30,trackColor,8));
      // Bridge supports
      svg.appendChild(rect(22,18,16,24,'#A1887F',3));
      svg.appendChild(rect(24,20,12,20,'#8D6E63',2));
      // Over track (N-S) — on top
      svg.appendChild(line(30,0,30,18,'#A1887F',12));
      svg.appendChild(line(30,0,30,18,trackColor,8));
      svg.appendChild(line(30,42,30,60,'#A1887F',12));
      svg.appendChild(line(30,42,30,60,trackColor,8));
      // Bridge deck
      svg.appendChild(rect(22,16,16,28,'#D7CCC8',2));
      svg.appendChild(line(30,16,30,44,'#BCAAA4',12));
      svg.appendChild(line(30,16,30,44,trackColor,8));
      // Railings
      svg.appendChild(line(22,16,22,44,'#8D6E63',2));
      svg.appendChild(line(38,16,38,44,'#8D6E63',2));
      break;

    case 'station':
      // Track
      [10,22,34,46].forEach(y => svg.appendChild(line(20,y,40,y,tieColor,tieWidth,'butt')));
      svg.appendChild(line(30,0,30,60,'#A1887F',12));
      svg.appendChild(line(30,0,30,60,trackColor,8));
      // Platform
      svg.appendChild(rect(42,10,14,40,'#E0E0E0',3));
      svg.appendChild(rect(42,10,14,40,'#BDBDBD',3));
      svg.appendChild(rect(44,14,10,6,'#F44336',2));
      // Platform edge
      svg.appendChild(line(42,10,42,50,'#9E9E9E',1.5));
      break;
  }

  return svg;
}

      // End windows
      svg.appendChild(el('rect', { x:24, y:37, width:5, height:4, rx:1, fill:'#FFCDD2' }));

  return svg;
}

// Palette preview SVGs (smaller, centered)
function createPaletteSVG(type) {
  if (type === 'train') {
    const svg = createTrainSVG();
    svg.style.width = '42px';
    svg.style.height = '42px';
    return svg;
  }
  if (CAR_TYPES.includes(type)) {
    const svg = createCarSVG(type);
    svg.style.width = '42px';
    svg.style.height = '42px';
    return svg;
  }
  if (SCENERY_TYPES.includes(type)) {
    const div = document.createElement('div');
    div.textContent = SCENERY_EMOJI[type];
    div.style.fontSize = '32px';
    return div;
  }
  const svg = createTrackSVG(type);
  svg.style.width = '48px';
  svg.style.height = '48px';
  return svg;
}

// ============================================================
// GRID RENDERING
// ============================================================
function initGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
  grid.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.dataset.row = r;
      cell.dataset.col = c;
      grid.appendChild(cell);
    }
  }
}

function renderCell(row, col) {
  const cell = getCellEl(row, col);
  if (!cell) return;

  // Clear existing content except connection dots
  cell.querySelectorAll('svg, .train-emoji, .train-svg, .scenery-emoji, .car-svg, .car-count-badge').forEach(el => el.remove());
  cell.classList.remove('occupied', 'has-train');

  const piece = state.grid[row][col];
  if (piece) {
    if (SCENERY_TYPES.includes(piece.type)) {
      const emoji = document.createElement('div');
      emoji.className = 'scenery-emoji';
      emoji.textContent = SCENERY_EMOJI[piece.type];
      // House glow in night mode
      if (piece.type === 'house' && isNightMode()) {
        emoji.style.textShadow = '0 0 12px rgba(255, 200, 50, 0.7), 0 0 24px rgba(255, 180, 30, 0.4)';
      }
      cell.appendChild(emoji);
      cell.classList.add('occupied');
    } else {
      const svg = createTrackSVG(piece.type);
      svg.style.transform = `rotate(${piece.rotation}deg)`;
      cell.appendChild(svg);
      cell.classList.add('occupied');
    }
  }

  // Train (top-down SVG)
  if (state.train && state.train.row === row && state.train.col === col && !state.playing) {
    const ts = createTrainSVG();
    ts.classList.add('train-svg');
    // Orient based on track connections
    const trackPiece = state.grid[row][col];
    if (trackPiece) {
      const conns = getConnections(trackPiece.type, trackPiece.rotation);
      const dirAngles = { N: 0, E: 90, S: 180, W: 270 };
      if (conns.length > 0) ts.style.transform = `rotate(${dirAngles[conns[0]] || 0}deg)`;
    }
    
    // Add pointer event handler for train-specific dragging
    ts.addEventListener('pointerdown', onTrainDown);
    
    cell.appendChild(ts);
    cell.classList.add('has-train');
  }

  updateConnectionDots(row, col);
}

function renderAllCells() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      renderCell(r, c);
  renderStaticCars();
}

function getCellEl(row, col) {
  return document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
}

function updateConnectionDots(row, col) {
  const cell = getCellEl(row, col);
  if (!cell) return;
  cell.querySelectorAll('.connection-dot').forEach(el => el.remove());

  const piece = state.grid[row][col];
  if (!piece || SCENERY_TYPES.includes(piece.type)) return;

  const conns = getConnections(piece.type, piece.rotation);
  conns.forEach(dir => {
    const dot = document.createElement('div');
    dot.className = 'connection-dot ' + dir.toLowerCase();
    if (neighborConnected(row, col, dir)) {
      dot.classList.add('connected');
    } else {
      dot.classList.add('disconnected');
    }
    cell.appendChild(dot);
  });
}

function updateAllConnectionDots() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (state.grid[r][c] && !SCENERY_TYPES.includes(state.grid[r][c].type)) {
        updateConnectionDots(r, c);
      }
    }
}

// ============================================================
// CAR POSITIONING (Static display)
// ============================================================
function getCarCellPositions() {
  if (!state.train || state.cars.length === 0) return [];

  const loco = state.train;
  const trackPiece = state.grid[loco.row][loco.col];
  if (!trackPiece || SCENERY_TYPES.includes(trackPiece.type)) return [];

  const conns = getConnections(trackPiece.type, trackPiece.rotation);
  if (conns.length < 2) return [];

  // Locomotive faces first connection direction; cars trail from the other
  const forwardDir = conns[0];
  const backwardExit = conns.find(d => d !== forwardDir);
  if (!backwardExit) return [];

  const positions = [];
  let currentRow = loco.row;
  let currentCol = loco.col;
  let exitDir = backwardExit;

  for (let i = 0; i < state.cars.length; i++) {
    const next = getNeighbor(currentRow, currentCol, exitDir);
    if (!next) break;

    const nextPiece = state.grid[next.row][next.col];
    if (!nextPiece || SCENERY_TYPES.includes(nextPiece.type)) break;

    const entryEdge = OPPOSITE[exitDir];
    const nextConns = getConnections(nextPiece.type, nextPiece.rotation);
    if (!nextConns.includes(entryEdge)) break;

    // Car faces toward the locomotive (forward direction of travel)
    positions.push({
      row: next.row,
      col: next.col,
      facingDir: OPPOSITE[exitDir],
      carIndex: i,
    });

    // Continue backward through this cell
    const nextExit = getExitDir(nextPiece.type, nextPiece.rotation, entryEdge);
    if (!nextExit) break;

    currentRow = next.row;
    currentCol = next.col;
    exitDir = nextExit;
  }

  return positions;
}

function sortCarsWithCabooseEnd() {
  const caboose = state.cars.filter(c => c.type === 'caboose');
  const others = state.cars.filter(c => c.type !== 'caboose');
  state.cars = [...others, ...caboose];
}

function renderStaticCars() {
  // Remove all existing car SVGs and badges
  document.querySelectorAll('.car-svg, .car-count-badge').forEach(el => el.remove());

  if (state.playing || state.cars.length === 0 || !state.train) return;

  // Show car count badge on locomotive cell
  const locoCell = getCellEl(state.train.row, state.train.col);
  if (locoCell) {
    const badge = document.createElement('div');
    badge.className = 'car-count-badge';
    badge.textContent = '🚃×' + state.cars.length;
    locoCell.appendChild(badge);
  }

  // Render cars on track cells behind locomotive
  const positions = getCarCellPositions();
  const dirAngles = { N: 0, E: 90, S: 180, W: 270 };
  positions.forEach(pos => {
    const cell = getCellEl(pos.row, pos.col);
    if (!cell) return;

    const car = state.cars[pos.carIndex];
    const cs = createCarSVG(car.type);
    cs.classList.add('car-svg');
    cs.style.transform = 'rotate(' + (dirAngles[pos.facingDir] || 0) + 'deg)';
    cell.appendChild(cs);
  });
}

// ============================================================
// UNDO
// ============================================================
function saveUndo() {
  state.undoStack.push({
    grid: state.grid.map(row => row.map(cell => cell ? { ...cell } : null)),
    train: state.train ? { ...state.train } : null,
    trainDir: state.trainDir,
    cars: state.cars.map(c => ({ ...c })),
  });
  if (state.undoStack.length > 50) state.undoStack.shift();
}

function undo() {
  if (state.playing || state.undoStack.length === 0) return;
  const prev = state.undoStack.pop();
  state.grid = prev.grid;
  state.train = prev.train;
  state.trainDir = prev.trainDir;
  state.cars = prev.cars || [];
  renderAllCells();
}

// ============================================================
// PIECE PLACEMENT
// ============================================================
// Visual pulse on auto-connected edges
function showAutoConnectPulse(row, col) {
  const cell = getCellEl(row, col);
  if (!cell) return;
  const dots = cell.querySelectorAll('.connection-dot.connected');
  dots.forEach(dot => {
    dot.classList.add('pulsing');
    dot.addEventListener('animationend', () => dot.classList.remove('pulsing'), { once: true });
  });
  // Also pulse the neighbor's matching dot
  const piece = state.grid[row][col];
  if (!piece) return;
  const conns = getConnections(piece.type, piece.rotation);
  conns.forEach(dir => {
    const nb = getNeighbor(row, col, dir);
    if (!nb) return;
    const nbCell = getCellEl(nb.row, nb.col);
    if (!nbCell) return;
    const oppDir = OPPOSITE[dir].toLowerCase();
    const nbDot = nbCell.querySelector(`.connection-dot.connected.${oppDir}`);
    if (nbDot) {
      nbDot.classList.add('pulsing');
      nbDot.addEventListener('animationend', () => nbDot.classList.remove('pulsing'), { once: true });
    }
  });
}

function placePiece(row, col, type, rotation = 0) {
  saveUndo();
  state.grid[row][col] = { type, rotation };
  if (SCENERY_TYPES.includes(type)) {
    SFX.placeScenery();
  } else {
    SFX.place();
  }
  renderCell(row, col);
  // Update neighbors' dots too
  ['N','S','E','W'].forEach(dir => {
    const nb = getNeighbor(row, col, dir);
    if (nb) updateConnectionDots(nb.row, nb.col);
  });
  renderStaticCars();
  autoSave();
}

function removePiece(row, col) {
  saveUndo();
  SFX.remove();
  // If train is here, remove train too
  if (state.train && state.train.row === row && state.train.col === col) {
    state.train = null;
  }
  state.grid[row][col] = null;
  renderCell(row, col);
  ['N','S','E','W'].forEach(dir => {
    const nb = getNeighbor(row, col, dir);
    if (nb) {
      updateConnectionDots(nb.row, nb.col);
      renderCell(nb.row, nb.col);
    }
  });
  renderStaticCars();
  autoSave();
}

function rotatePiece(row, col) {
  const piece = state.grid[row][col];
  if (!piece || SCENERY_TYPES.includes(piece.type)) return;
  saveUndo();
  SFX.rotate();
  piece.rotation = (piece.rotation + 90) % 360;
  renderCell(row, col);
  ['N','S','E','W'].forEach(dir => {
    const nb = getNeighbor(row, col, dir);
    if (nb) updateConnectionDots(nb.row, nb.col);
  });
  renderStaticCars();
  autoSave();
}

function placeTrain(row, col) {
  const piece = state.grid[row][col];
  if (!piece || SCENERY_TYPES.includes(piece.type)) return;
  saveUndo();
  // Remove old train rendering — update state FIRST so renderCell won't re-draw
  const oldTrain = state.train;
  state.train = { row, col };
  if (oldTrain) renderCell(oldTrain.row, oldTrain.col);
  renderCell(row, col);
  renderStaticCars();
  autoSave();
}

function clearAll() {
  if (state.playing) stopPlay();
  saveUndo();
  SFX.clear();
  state.grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  state.train = null;
  state.cars = [];
  renderAllCells();
  clearAutoSave();
  showToast('Board cleared!');
}

// ============================================================
// RIGHT-CLICK TO REMOVE (Feature #2)
// ============================================================
let longPressTimer = null;
let longPressTarget = null;

function showPoofEffect(row, col) {
  const cell = getCellEl(row, col);
  if (!cell) return;
  
  const poof = document.createElement('div');
  poof.className = 'poof-effect';
  poof.textContent = '💨';
  cell.appendChild(poof);
  
  // Remove after animation completes
  setTimeout(() => poof.remove(), 500);
}

function handleRemoveCell(row, col) {
  if (state.playing) return;

  // Check if this cell has a car (takes priority over track removal)
  const carPositions = getCarCellPositions();
  const carPos = carPositions.find(p => p.row === row && p.col === col);
  if (carPos) {
    saveUndo();
    const removed = state.cars.splice(carPos.carIndex, 1)[0];
    SFX.remove();
    showPoofEffect(row, col);
    const typeName = removed.type.charAt(0).toUpperCase() + removed.type.slice(1);
    showToast('🚃 ' + typeName + ' car removed!');
    renderAllCells();
    autoSave();
    return;
  }

  const piece = state.grid[row][col];
  const hasTrain = state.train && state.train.row === row && state.train.col === col;

  // Only remove if there's something to remove
  if (!piece && !hasTrain) return;

  showPoofEffect(row, col);

  // Track how many cars are removed when removing locomotive
  const carsRemoved = (hasTrain && state.cars.length > 0) ? state.cars.length : 0;
  if (carsRemoved > 0) state.cars = [];

  removePiece(row, col);

  // Show appropriate toast message
  if (hasTrain && piece && carsRemoved > 0) {
    showToast('🚂 Train + ' + carsRemoved + ' car' + (carsRemoved > 1 ? 's' : '') + ' removed!');
  } else if (hasTrain && piece) {
    showToast('🚂 Train and track removed!');
  } else if (hasTrain) {
    showToast('🚂 Train removed!');
  } else if (SCENERY_TYPES.includes(piece.type)) {
    showToast(SCENERY_EMOJI[piece.type] + ' Scenery removed!');
  } else {
    showToast('Track removed!');
  }
}

function startLongPress(row, col) {
  longPressTarget = { row, col };
  longPressTimer = setTimeout(() => {
    if (longPressTarget) {
      handleRemoveCell(row, col);
      longPressTarget = null;
    }
  }, 500);
}

function cancelLongPress() {
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
  longPressTarget = null;
}

// ============================================================
// DRAG & DROP (Pointer Events)
// ============================================================
let dragInfo = null;
const ghost = document.getElementById('ghost');
const trashZone = document.getElementById('trash-zone');

function initDragAndDrop() {
  // Palette pieces
  document.querySelectorAll('.palette-piece').forEach(el => {
    el.addEventListener('pointerdown', onPaletteDown);
  });

  // Grid cells
  const grid = document.getElementById('grid');
  grid.addEventListener('pointerdown', onGridDown);
  
  // Right-click to remove
  grid.addEventListener('contextmenu', onGridContextMenu);

  // Global move/up
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);
}

function onGridContextMenu(e) {
  e.preventDefault();
  
  const cell = e.target.closest('.cell');
  if (!cell) return;
  
  const row = +cell.dataset.row, col = +cell.dataset.col;
  handleRemoveCell(row, col);
}

function onTrainDown(e) {
  if (state.playing) return;
  e.preventDefault();
  e.stopPropagation(); // Prevent grid cell handler from firing
  
  // Find which cell the train is in
  const trainCell = e.target.closest('.cell');
  if (!trainCell) return;
  
  const row = +trainCell.dataset.row;
  const col = +trainCell.dataset.col;
  
  dragInfo = {
    type: 'train',
    source: 'train-only',
    startX: e.clientX,
    startY: e.clientY,
    sourceRow: row,
    sourceCol: col,
    moved: false,
  };
  
  // Start showing ghost immediately for train
  showGhost('train', e.clientX, e.clientY);
  trashZone.classList.add('visible');
}

function onPaletteDown(e) {
  if (state.playing) return;
  e.preventDefault();
  const type = e.currentTarget.dataset.type;

  dragInfo = {
    type: type,
    source: 'palette',
    startX: e.clientX,
    startY: e.clientY,
    sourceRow: null,
    sourceCol: null,
  };

  // Create ghost
  showGhost(type, e.clientX, e.clientY);
  trashZone.classList.add('visible');
}

function onGridDown(e) {
  if (state.playing) return;
  const cell = e.target.closest('.cell');
  if (!cell) return;
  const row = +cell.dataset.row, col = +cell.dataset.col;
  const piece = state.grid[row][col];

  // Start long-press timer for mobile (touch) removal
  startLongPress(row, col);

  // If clicking an occupied cell and not starting a drag, rotate
  if (piece && !SCENERY_TYPES.includes(piece.type)) {
    // Start potential drag — if they move enough, it's a drag; else it's a click (rotate)
    dragInfo = {
      type: piece.type,
      source: 'grid',
      startX: e.clientX,
      startY: e.clientY,
      sourceRow: row,
      sourceCol: col,
      rotation: piece.rotation,
      moved: false,
      hasTrain: state.train && state.train.row === row && state.train.col === col,
    };
    return;
  }

  if (piece && SCENERY_TYPES.includes(piece.type)) {
    dragInfo = {
      type: piece.type,
      source: 'grid',
      startX: e.clientX,
      startY: e.clientY,
      sourceRow: row,
      sourceCol: col,
      moved: false,
    };
    return;
  }

  // Check if train is here but no piece (shouldn't happen)
  if (state.train && state.train.row === row && state.train.col === col) {
    dragInfo = {
      type: 'train',
      source: 'grid',
      startX: e.clientX,
      startY: e.clientY,
      sourceRow: row,
      sourceCol: col,
      moved: false,
    };
  }
}

function onPointerMove(e) {
  if (!dragInfo) return;

  const dx = e.clientX - dragInfo.startX;
  const dy = e.clientY - dragInfo.startY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (!dragInfo.moved && dist < 8) return; // threshold before starting drag

  if (!dragInfo.moved) {
    dragInfo.moved = true;
    // Cancel long-press if we start dragging
    cancelLongPress();
    
    // If from grid, pick up the piece
    if (dragInfo.source === 'grid') {
      showGhost(dragInfo.type, e.clientX, e.clientY, dragInfo.rotation);
      trashZone.classList.add('visible');
    }
    
    // If train-only drag, hide train from source cell
    if (dragInfo.source === 'train-only') {
      const sourceCell = getCellEl(dragInfo.sourceRow, dragInfo.sourceCol);
      if (sourceCell) {
        const trainSvg = sourceCell.querySelector('.train-svg');
        if (trainSvg) trainSvg.style.opacity = '0';
      }
    }
  }

  ghost.style.left = e.clientX + 'px';
  ghost.style.top = e.clientY + 'px';

  // Highlight cell under cursor
  highlightCellUnder(e.clientX, e.clientY);

  // Check trash zone
  const trashRect = trashZone.getBoundingClientRect();
  if (e.clientX >= trashRect.left && e.clientX <= trashRect.right &&
      e.clientY >= trashRect.top && e.clientY <= trashRect.bottom) {
    trashZone.classList.add('hover');
  } else {
    trashZone.classList.remove('hover');
  }
}

function onPointerUp(e) {
  // Cancel long-press on pointer up
  cancelLongPress();
  
  if (!dragInfo) return;

  clearHighlight();
  trashZone.classList.remove('visible', 'hover');

  // If we didn't move (it was a click), handle click action
  if (!dragInfo.moved && dragInfo.source === 'grid') {
    const row = dragInfo.sourceRow, col = dragInfo.sourceCol;
    const piece = state.grid[row][col];
    if (piece && !SCENERY_TYPES.includes(piece.type)) {
      rotatePiece(row, col);
    }
    hideGhost();
    dragInfo = null;
    return;
  }

  if (!dragInfo.moved) {
    hideGhost();
    dragInfo = null;
    return;
  }

  // Check if dropped on trash
  const trashRect = trashZone.getBoundingClientRect();
  if (e.clientX >= trashRect.left && e.clientX <= trashRect.right &&
      e.clientY >= trashRect.top && e.clientY <= trashRect.bottom) {
    // Delete the piece
    if (dragInfo.source === 'grid') {
      removePiece(dragInfo.sourceRow, dragInfo.sourceCol);
    } else if (dragInfo.source === 'train-only') {
      // Remove train (but keep the track)
      saveUndo();
      state.train = null;
      state.cars = [];
      SFX.remove();
      renderCell(dragInfo.sourceRow, dragInfo.sourceCol);
      renderStaticCars();
      autoSave();
      showToast('🚂 Train removed!');
    }
    hideGhost();
    dragInfo = null;
    return;
  }

  // Find target cell
  const target = getCellUnder(e.clientX, e.clientY);

  if (target) {
    const { row, col } = target;
    const existing = state.grid[row][col];

    if (dragInfo.type === 'train') {
      // FEATURE #3: Train Dragging with validation
      const piece = state.grid[row][col];
      const isValidDrop = piece && !SCENERY_TYPES.includes(piece.type);
      
      if (dragInfo.source === 'train-only') {
        // Train-only drag: validate and snap back if invalid
        if (isValidDrop) {
          saveUndo();
          state.train = { row, col };
          renderCell(dragInfo.sourceRow, dragInfo.sourceCol);
          renderCell(row, col);
          renderStaticCars();
          SFX.place();
          showToast('🚂 Train moved!');
        } else {
          // Invalid drop: snap back animation
          animateSnapBack(dragInfo.sourceRow, dragInfo.sourceCol);
          showToast('Train needs a track! 🛤️');
        }
      } else {
        // From palette or old grid drag
        if (isValidDrop) {
          // FEATURE: Single Train Enforcement
          // When placing train from palette, show flash at old location if replacing
          if (dragInfo.source === 'palette' && state.train) {
            const oldRow = state.train.row;
            const oldCol = state.train.col;
            const oldCell = getCellEl(oldRow, oldCol);
            if (oldCell) {
              oldCell.classList.add('replacing-train');
              setTimeout(() => oldCell.classList.remove('replacing-train'), 500);
            }
            showToast('🚂 Train relocated!');
          }
          placeTrain(row, col);
        } else {
          showToast('Place train on a track piece!');
          // Return to source if from grid
          if (dragInfo.source === 'grid') {
            placeTrain(dragInfo.sourceRow, dragInfo.sourceCol);
          }
        }
      }
    } else if (SCENERY_TYPES.includes(dragInfo.type)) {
      // Scenery: place on empty cells only
      if (!existing) {
        placePiece(row, col, dragInfo.type);
      } else if (dragInfo.source === 'grid' && (row !== dragInfo.sourceRow || col !== dragInfo.sourceCol)) {
        // Swap or reject
        showToast('Cell occupied!');
      }
      // Remove from source if grid
      if (dragInfo.source === 'grid' && (row !== dragInfo.sourceRow || col !== dragInfo.sourceCol)) {
        removePiece(dragInfo.sourceRow, dragInfo.sourceCol);
        if (!state.grid[row][col]) placePiece(row, col, dragInfo.type);
      }
    } else if (CAR_TYPES.includes(dragInfo.type)) {
      // Car: must be dropped on the locomotive to attach
      if (state.train && row === state.train.row && col === state.train.col) {
        if (state.cars.length >= MAX_CARS) {
          showToast('🚃 Train is full! (max ' + MAX_CARS + ' cars)');
        } else {
          saveUndo();
          state.cars.push({ type: dragInfo.type });
          sortCarsWithCabooseEnd();
          SFX.couple();
          const typeName = dragInfo.type.charAt(0).toUpperCase() + dragInfo.type.slice(1);
          showToast('🚃 ' + typeName + ' car added!');
          renderAllCells();
          autoSave();
        }
      } else if (state.train) {
        showToast('Drop on the locomotive! 🚂');
      } else {
        showToast('Place a locomotive first! 🚂');
      }
    } else {
      // Track piece
      if (dragInfo.source === 'grid') {
        // Remove from old position
        const oldRow = dragInfo.sourceRow, oldCol = dragInfo.sourceCol;
        const hadTrain = dragInfo.hasTrain;
        removePiece(oldRow, oldCol);

        // Place at new position (replace whatever is there)
        if (existing && SCENERY_TYPES.includes(existing.type)) {
          // Track replaces scenery
        }
        placePiece(row, col, dragInfo.type, dragInfo.rotation || 0);
        if (hadTrain) placeTrain(row, col);
      } else {
        // From palette: replace anything on the cell
        if (existing && SCENERY_TYPES.includes(existing.type)) {
          removePiece(row, col);
        }
        // Smart Auto-Connect: find best rotation for palette drops
        const autoResult = findBestRotation(row, col, dragInfo.type);
        const autoRotation = autoResult.rotation;
        if (state.train && state.train.row === row && state.train.col === col) {
          // Keep train, replace track under it
          placePiece(row, col, dragInfo.type, autoRotation);
        } else {
          placePiece(row, col, dragInfo.type, autoRotation);
        }
        // Pulse connected dots if auto-connect found matches
        if (autoResult.score > 0) {
          showAutoConnectPulse(row, col);
        }
      }
    }
  } else {
    // Dropped outside grid
    if (dragInfo.source === 'train-only') {
      // Train dragged off-grid: remove it
      saveUndo();
      state.train = null;
      SFX.remove();
      renderCell(dragInfo.sourceRow, dragInfo.sourceCol);
      autoSave();
      showToast('🚂 Train removed!');
    } else if (dragInfo.source === 'grid') {
      // Remove piece (dragged off = delete)
      removePiece(dragInfo.sourceRow, dragInfo.sourceCol);
      showToast('Removed!');
    }
  }

  hideGhost();
  dragInfo = null;
}

function animateSnapBack(row, col) {
  // Show the train snapping back to original position
  const cell = getCellEl(row, col);
  if (!cell) {
    renderCell(row, col);
    return;
  }
  
  // Re-render to show train
  renderCell(row, col);
  
  // Add snap-back animation class
  const trainSvg = cell.querySelector('.train-svg');
  if (trainSvg) {
    trainSvg.classList.add('snapping-back');
    trainSvg.style.transform = trainSvg.style.transform || 'rotate(0deg)';
    
    // Remove animation class after animation completes
    setTimeout(() => {
      trainSvg.classList.remove('snapping-back');
    }, 400);
  }
}

function showGhost(type, x, y, rotation = 0) {
  ghost.innerHTML = '';
  ghost.style.display = 'block';
  ghost.style.left = x + 'px';
  ghost.style.top = y + 'px';

  if (type === 'train') {
    const svg = createTrainSVG();
    svg.style.width = (cellSize * 0.7) + 'px';
    svg.style.height = (cellSize * 0.7) + 'px';
    ghost.appendChild(svg);
    ghost.style.fontSize = '';
  } else if (CAR_TYPES.includes(type)) {
    const svg = createCarSVG(type);
    svg.style.width = (cellSize * 0.65) + 'px';
    svg.style.height = (cellSize * 0.65) + 'px';
    ghost.appendChild(svg);
    ghost.style.fontSize = '';
  } else if (SCENERY_TYPES.includes(type)) {
    ghost.textContent = SCENERY_EMOJI[type];
    ghost.style.fontSize = (cellSize * 0.55) + 'px';
  } else {
    const svg = createTrackSVG(type);
    svg.style.width = cellSize + 'px';
    svg.style.height = cellSize + 'px';
    svg.style.transform = `rotate(${rotation}deg)`;
    ghost.appendChild(svg);
    ghost.style.fontSize = '';

}

function hideGhost() {
  ghost.style.display = 'none';
  ghost.innerHTML = '';
  ghost.textContent = '';
}

function getCellUnder(x, y) {
  const grid = document.getElementById('grid');
  const rect = grid.getBoundingClientRect();
  const col = Math.floor((x - rect.left) / (cellSize + 1)); // +1 for gap
  const row = Math.floor((y - rect.top) / (cellSize + 1));
  if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
    return { row, col };
  }
  return null;
}

// Ghost preview state
let ghostPreviewCell = null;
let ghostPreviewRow = -1;
let ghostPreviewCol = -1;

function showCellGhostPreview(row, col) {
  const cell = getCellEl(row, col);
  if (!cell || !dragInfo) return;

  const type = dragInfo.type;

  if (type === 'train') {
    const svg = createTrainSVG();
    svg.classList.add('ghost-preview');
    svg.style.position = 'absolute';
    svg.style.top = '5%';
    svg.style.left = '5%';
    svg.style.width = '90%';
    svg.style.height = '90%';
    const trackPiece = state.grid[row][col];
    if (trackPiece && !SCENERY_TYPES.includes(trackPiece.type)) {
      const conns = getConnections(trackPiece.type, trackPiece.rotation);
      const dirAngles = { N: 0, E: 90, S: 180, W: 270 };
      if (conns.length > 0) svg.style.transform = `rotate(${dirAngles[conns[0]] || 0}deg)`;
    }
    cell.appendChild(svg);
  } else if (CAR_TYPES.includes(type)) {
    // Cars: highlight loco cell green, others red
    if (state.train && row === state.train.row && col === state.train.col) {
      cell.classList.add('ghost-match');
    } else {
      cell.classList.add('ghost-mismatch');
    }
  } else if (SCENERY_TYPES.includes(type)) {
    const emoji = document.createElement('div');
    emoji.className = 'ghost-preview-emoji';
    emoji.textContent = SCENERY_EMOJI[type];
    emoji.style.fontSize = (cellSize * 0.55) + 'px';
    cell.appendChild(emoji);
  } else {
    // Track piece — compute rotation
    let rotation = 0;
    if (dragInfo.source === 'palette') {
      rotation = findBestRotation(row, col, type).rotation;
    } else {
      rotation = dragInfo.rotation || 0;
    }

    const svg = createTrackSVG(type);
    svg.classList.add('ghost-preview');
    svg.style.transform = `rotate(${rotation}deg)`;
    cell.appendChild(svg);

    // Connection scoring for border color
    const conns = getConnections(type, rotation);
    let matchCount = 0;
    let hasTrackNeighbors = false;

    for (const dir of conns) {
      const nb = getNeighbor(row, col, dir);
      if (!nb) continue;
      const nbPiece = state.grid[nb.row][nb.col];
      if (!nbPiece || SCENERY_TYPES.includes(nbPiece.type)) continue;
      hasTrackNeighbors = true;
      if (getConnections(nbPiece.type, nbPiece.rotation).includes(OPPOSITE[dir])) matchCount++;
    }

    // Check for track neighbors even if our connections don't face them
    if (!hasTrackNeighbors) {
      for (const dir of ['N', 'S', 'E', 'W']) {
        const nb = getNeighbor(row, col, dir);
        if (!nb) continue;
        const nbPiece = state.grid[nb.row][nb.col];
        if (nbPiece && !SCENERY_TYPES.includes(nbPiece.type)) {
          hasTrackNeighbors = true;
          break;
        }
      }
    }

    if (hasTrackNeighbors && matchCount > 0) {
      cell.classList.add('ghost-match');
    } else if (hasTrackNeighbors) {
      cell.classList.add('ghost-mismatch');
    }
  }

  ghostPreviewCell = cell;
  ghostPreviewRow = row;
  ghostPreviewCol = col;
}

function clearCellGhostPreview() {
  if (ghostPreviewCell) {
    ghostPreviewCell.querySelectorAll('.ghost-preview, .ghost-preview-emoji').forEach(el => el.remove());
    ghostPreviewCell.classList.remove('ghost-match', 'ghost-mismatch');
    ghostPreviewCell = null;
  }
  ghostPreviewRow = -1;
  ghostPreviewCol = -1;
}

let highlightedCell = null;
function highlightCellUnder(x, y) {
  // Remove previous cell highlight (preserve ghost preview if same cell)
  if (highlightedCell) {
    highlightedCell.classList.remove('highlight');
    highlightedCell = null;
  }
  const target = getCellUnder(x, y);
  if (target) {
    const el = getCellEl(target.row, target.col);
    if (el) { el.classList.add('highlight'); highlightedCell = el; }
    // Update ghost preview only when cell changes
    if (dragInfo && dragInfo.moved) {
      if (target.row !== ghostPreviewRow || target.col !== ghostPreviewCol) {
        clearCellGhostPreview();
        showCellGhostPreview(target.row, target.col);
      }
    }
  } else {
    clearCellGhostPreview();
  }
}

function clearHighlight() {
  clearCellGhostPreview();
  if (highlightedCell) {
    highlightedCell.classList.remove('highlight');
    highlightedCell = null;
  }
}

// ============================================================
// TRAIN ANIMATION
// ============================================================
// Edge midpoints in cell-local coordinates (0-1 range)
const EDGE_POS = {
  N: { x: 0.5, y: 0 },
  S: { x: 0.5, y: 1 },
  E: { x: 1, y: 0.5 },
  W: { x: 0, y: 0.5 },
};

// Corner shared by two adjacent edges (center of quarter-circle arc)
function getCurveCorner(edgeA, edgeB) {
  const key = [edgeA, edgeB].sort().join('');
  switch(key) {
    case 'EN': return { x: 1, y: 0 };
    case 'ES': return { x: 1, y: 1 };
    case 'SW': return { x: 0, y: 1 };
    case 'NW': return { x: 0, y: 0 };
  }
  return null;
}

function getPathPoints(type, rotation, entryEdge, exitEdge) {
  const start = EDGE_POS[entryEdge];
  const end = EDGE_POS[exitEdge];

  // Curve/turn: adjacent edges (not crossover/bridge which go straight through)
  if (entryEdge !== OPPOSITE[exitEdge] && !['crossover','bridge'].includes(type)) {
    // Quarter-circle arc centered at shared corner, r=0.5
    const corner = getCurveCorner(entryEdge, exitEdge);
    if (!corner) return [start, end];
    const r = 0.5;
    const startAngle = Math.atan2(start.y - corner.y, start.x - corner.x);
    const endAngle = Math.atan2(end.y - corner.y, end.x - corner.x);
    let sweep = endAngle - startAngle;
    if (sweep > Math.PI) sweep -= 2 * Math.PI;
    if (sweep < -Math.PI) sweep += 2 * Math.PI;

    const points = [];
    const steps = 16;
    for (let i = 0; i <= steps; i++) {
      const a = startAngle + sweep * (i / steps);
      points.push({
        x: corner.x + r * Math.cos(a),
        y: corner.y + r * Math.sin(a),
      });
    }
    return points;
  }

  // Straight path (crossover, bridge, opposite edges)
  return [start, end];
}

function pathLength(points) {
  let len = 0;
  for (let i = 1; i < points.length; i++) {
    const dx = points[i].x - points[i-1].x;
    const dy = points[i].y - points[i-1].y;
    len += Math.sqrt(dx*dx + dy*dy);
  }
  return len;
}

function interpolatePath(points, t) {
  if (points.length < 2) return points[0] || { x: 0.5, y: 0.5 };
  const totalLen = pathLength(points);
  const targetDist = t * totalLen;
  let accumulated = 0;
  for (let i = 1; i < points.length; i++) {
    const dx = points[i].x - points[i-1].x;
    const dy = points[i].y - points[i-1].y;
    const segLen = Math.sqrt(dx*dx + dy*dy);
    if (accumulated + segLen >= targetDist) {
      const segT = (targetDist - accumulated) / segLen;
      return {
        x: points[i-1].x + dx * segT,
        y: points[i-1].y + dy * segT,
        angle: Math.atan2(dy, dx),
      };
    }
    accumulated += segLen;
  }
  const last = points[points.length-1];
  const prev = points[points.length-2];
  return {
    x: last.x,
    y: last.y,
    angle: Math.atan2(last.y - prev.y, last.x - prev.x),
  };
}

// SMOKE PARTICLE SYSTEM

let smokeInterval = null;
let smokeParticles = [];
const MAX_SMOKE_PARTICLES = 30;

function spawnSmokeParticle() {
  if (!animState || !animState.trainEl) return;

  // Get train position in grid-container coordinates
  const trainEl = animState.trainEl;
  const left = parseFloat(trainEl.style.left) || 0;
  const top = parseFloat(trainEl.style.top) || 0;

  // Recycle oldest particle if at limit
  if (smokeParticles.length >= MAX_SMOKE_PARTICLES) {
    const old = smokeParticles.shift();
    if (old.parentNode) old.remove();
  }

  const particle = document.createElement('div');
  particle.className = 'smoke-particle';

  // Random size 3-6px
  const size = 3 + Math.random() * 3;
  particle.style.width = size + 'px';
  particle.style.height = size + 'px';

  // Random horizontal drift ±10px
  const dx = (Math.random() - 0.5) * 20;
  particle.style.setProperty('--smoke-dx', dx + 'px');

  // Random duration 0.6-1.0s
  const duration = 0.6 + Math.random() * 0.4;
  particle.style.setProperty('--smoke-duration', duration + 's');

  // Random gray shade (lighter in night mode for visibility)
  const nightMode = isNightMode();
  const shade = nightMode ? (210 + Math.floor(Math.random() * 40)) : (180 + Math.floor(Math.random() * 50));
  const alpha = nightMode ? 0.5 : 0.7;
  particle.style.background = `rgba(${shade}, ${shade}, ${shade}, ${alpha})`;

  // Position at smokestack (slightly above center of train)
  particle.style.left = left + 'px';
  particle.style.top = (top - cellSize * 0.15) + 'px';

  document.getElementById('grid-container').appendChild(particle);
  smokeParticles.push(particle);

  // Auto-remove after animation
  setTimeout(() => {
    const idx = smokeParticles.indexOf(particle);
    if (idx !== -1) smokeParticles.splice(idx, 1);
    if (particle.parentNode) particle.remove();
  }, duration * 1000 + 50);
}

function startSmokeLoop() {
  stopSmokeLoop();
  smokeInterval = setInterval(() => {
    if (!state.playing || !animState) { stopSmokeLoop(); return; }
    spawnSmokeParticle();
  }, getSmokeInterval());
}

function getSmokeInterval() {
  const speed = parseFloat(document.getElementById('speed-slider').value) || 1;
  // ~3-5 per second at 1x, scales with speed
  return Math.max(60, Math.floor(250 / speed));
}

function updateSmokeRate() {
  if (!smokeInterval || !state.playing) return;
  stopSmokeLoop();
  startSmokeLoop();
}

function stopSmokeLoop() {
  if (smokeInterval) { clearInterval(smokeInterval); smokeInterval = null; }
}

function cleanupSmokeParticles() {
  smokeParticles.forEach(p => { if (p.parentNode) p.remove(); });
  smokeParticles = [];
}

function triggerLoopCelebration() {
  if (!animState || !animState.trainEl) return;

  SFX.celebrate();
  showToast('🎉 Full Loop!');

  const trainEl = animState.trainEl;
  const left = parseFloat(trainEl.style.left) || 0;
  const top = parseFloat(trainEl.style.top) || 0;
  const container = document.getElementById('grid-container');

  const colors = ['#FF5252', '#FFAB40', '#FFEB3B', '#69F0AE', '#40C4FF', '#E040FB', '#FF4081', '#7C4DFF'];
  const numParticles = 25;

  for (let i = 0; i < numParticles; i++) {
    const particle = document.createElement('div');

    // Random size 5-9px

    // Random color
    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
